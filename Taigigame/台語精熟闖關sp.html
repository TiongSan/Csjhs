<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>台語精熟闖關-寶物交換版</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Huninn&family=Iansui&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="jsQR.js"></script>
  <script src="questions.js"></script>
  <script src="fractal.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>台語精熟闖關</h1>
      <p>iPad 友善版｜積分、連擊與寶物交換系統</p>
    </div>
    <div id="app" class="card"></div>
  </div>

  <div class="fractal-box" aria-hidden="true">
    <canvas id="fractalCanvas" width="180" height="180"></canvas>
  </div>

  <script>
    /***********************
     * 核心設定與狀態
     ***********************/
    const SECRET_SALT = "TAIGI_MASTER";
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScDInn5Vn1UwxYqzeuMhcdZAFE20ErqPURU8zurg_lRsWwbUg/viewform?usp=sharing";

    const state = {
      classCode: "",
      seatNo: "",
      points: 0,
      currentLevelIndex: 0,
      currentQuestionIndex: 0,
      levelCorrect: 0,
      levelTotal: 0,
      totalCorrect: 0,
      totalTotal: 0,
      masteryBits: [],
      finished: false,
      currentCombo: 0,
      // 寶物背包：[金星, 鑽石, 皇冠]
      inventory: [0, 0, 0], 
      // 已領取的禮物代碼，防止重複掃描同一張圖
      scannedGifts: [] 
    };

    const TREASURE_TYPES = [
      { name: "金星", icon: "🌟", rate: 0.4 },
      { name: "鑽石", icon: "💎", rate: 0.3 },
      { name: "皇冠", icon: "👑", rate: 0.1 }
    ];

    let activeQuestionBank = [];

    /***********************
     * 工具與結果碼處理 (含 B 標籤)
     ***********************/
    function $(id){ return document.getElementById(id); }
    function pad2(n){ return String(n).padStart(2, "0"); }

    function getShortTimestamp(){
      const now = new Date();
      return `${pad2(now.getMonth()+1)}${pad2(now.getDate())}${pad2(now.getHours())}${pad2(now.getMinutes())}`;
    }

    function calculateVCode(payload){
      let hash = 0;
      const str = payload + SECRET_SALT;
      for(let i=0; i<str.length; i++){
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString(36).toUpperCase().slice(-4);
    }

    function generateResultString(){
      const mastery = activeQuestionBank.map((_, idx) => state.masteryBits[idx] ? "1" : "0").join("");
      // 寶物狀態壓縮成 B102 格式
      const invStr = state.inventory.join("");
      const payload = [
        "TG",
        `G${state.classCode}`,
        `N${state.seatNo}`,
        `S${state.points}`,
        `T${state.totalTotal + state.levelTotal}`,
        `C${state.totalCorrect + state.levelCorrect}`,
        `M${mastery}`,
        `B${invStr}`, // 新增寶物標籤
        `D${getShortTimestamp()}`,
        `F${state.finished ? 1 : 0}`
      ].join("|");
      return `${payload}|V${calculateVCode(payload)}`;
    }

    function parseResultString(str){
      const raw = String(str || "").trim();
      const parts = raw.split("|");
      if(parts.length < 8 || parts[0] !== "TG") return null;

      const obj = {};
      let payloadParts = [];
      for(const p of parts){
        const key = p.charAt(0);
        obj[key] = p.slice(1);
        if(key !== "V") payloadParts.push(p);
      }

      if(obj.V !== calculateVCode(payloadParts.join("|"))) return { error: "防竄改驗證失敗！結果碼已被修改。" };

      return {
        classCode: obj.G,
        seatNo: obj.N,
        points: Number(obj.S || 0),
        total: Number(obj.T),
        correct: Number(obj.C),
        mastery: obj.M,
        inventory: obj.B ? obj.B.split("").map(Number) : [0, 0, 0],
        timestamp: obj.D,
        finished: obj.F === "1"
      };
    }

    /***********************
     * 畫面邏輯
     ***********************/
    function showStart(){
      $("app").innerHTML = `
        <div class="screen center">
          <h2>開始挑戰</h2>
          <div class="meta-grid" style="max-width:600px; margin:20px auto;">
            <div>
              <label>班級</label>
              <select id="studentClass">
                <option value="">請選擇</option>
                ${Array.from({length:9}, (_,i)=>701+i).map(c=>`<option value="${c}">${c}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>座號</label>
              <select id="studentSeat">
                <option value="">請選擇</option>
                ${Array.from({length:40}, (_,i)=>i+1).map(n=>`<option value="${pad2(n)}">${n} 號</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="row" style="justify-content:center;">
            <button class="btn-primary" onclick="startGame()">正式挑戰</button>
            <button class="btn-secondary" onclick="showLoadProgressModal()">載入進度</button>
          </div>
        </div>
      `;
    }

    function startGame(){
      const cls = $("studentClass").value;
      const seat = $("studentSeat").value;
      if(!cls || !seat){ alert("請選擇班級與座號"); return; }
      
      // 初始化
      state.classCode = cls;
      state.seatNo = seat;
      state.points = 0;
      state.inventory = [0, 0, 0];
      state.currentLevelIndex = 0;
      state.currentQuestionIndex = 0;
      state.levelCorrect = 0;
      state.levelTotal = 0;
      state.totalCorrect = 0;
      state.totalTotal = 0;
      state.masteryBits = [];
      state.finished = false;
      state.currentCombo = 0;
      
      activeQuestionBank = buildActiveQuestionBank(DEFAULT_QUESTION_BANK);
      fractalForest.reset();
      showQuestion();
    }

    function showQuestion(){
      $("app").innerHTML = `
        <div class="screen">
          <div class="row-between">
            <div class="pill">Level ${state.currentLevelIndex + 1} | Q ${state.currentQuestionIndex + 1}/5</div>
            <div class="pill" style="color:#d97706; background:#fffbeb;">積分：${state.points}</div>
          </div>
          
          <div class="row-between" style="margin-top:10px;">
             <div class="student-badge">${state.classCode} 班 ${Number(state.seatNo)} 號</div>
             <div class="inventory-bar">
               ${TREASURE_TYPES.map((t, i) => `<span>${t.icon} ${state.inventory[i]}</span>`).join(" ")}
             </div>
          </div>

          <div class="question-box">
            <p class="question-title">${activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex].q}</p>
            <div class="options">
              ${activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex].options.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`).join("")}
            </div>
            <div id="feedback" class="feedback"></div>
          </div>
          
          <div class="row" style="justify-content:center; gap:10px; margin-top:16px;">
            <button class="btn-primary" style="background:#4f46e5" onclick="showExchangeGateway()">🤝 寶物交換區</button>
            <button class="btn-secondary" onclick="showStats()">統計卡片</button>
            <button class="btn-warning" onclick="saveProgressModal()">💾 中途存檔</button>
          </div>
        </div>
      `;
    }

    function checkAnswer(idx){
      const q = activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex];
      const isCorrect = idx === q.answer;
      state.levelTotal++;
      
      let earned = 0;
      if(isCorrect){
        state.levelCorrect++;
        state.currentCombo++;
        earned = 10 + (state.currentCombo - 1) * 2;
        state.points += earned;
      } else {
        state.currentCombo = 0;
      }
      
      fractalForest.grow();
      const fb = $("feedback");
      fb.className = isCorrect ? "feedback success" : "feedback error";
      fb.innerHTML = isCorrect ? `答對了！積分 +${earned}${state.currentCombo>1?` (🔥${state.currentCombo}連擊)` : ""}` : "答錯了。";
      fb.style.display = "block";
      
      if(isCorrect && state.currentCombo > 1) createBonusEffect(state.currentCombo, earned);

      document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
      setTimeout(() => {
        state.currentQuestionIndex++;
        if(state.currentQuestionIndex >= 5) finishLevel();
        else showQuestion();
      }, 1000);
    }

    function finishLevel(){
      const isPerfect = state.levelCorrect === 5;
      if(isPerfect) state.points += 30;

      // 嘗試掉落寶物
      let dropped = null;
      const roll = Math.random();
      if(roll < 0.1) dropped = 2; // 皇冠 10%
      else if(roll < 0.4) dropped = 1; // 鑽石 30%
      else if(roll < 0.8) dropped = 0; // 金星 40%

      if(dropped !== null) state.inventory[dropped]++;

      $("app").innerHTML = `
        <div class="screen center">
          ${isPerfect ? `<div class="perfect-badge">💯 完美過關！+30 積分</div>` : `<h2>Level ${state.currentLevelIndex+1} 結束</h2>`}
          
          <div class="meta-box" style="margin:20px auto; max-width:240px;">
            <div class="label">本關得分</div>
            <div class="value">${state.levelCorrect}/5</div>
          </div>

          ${dropped !== null ? `
            <div class="treasure-drop-anim">
              <div style="font-size:50px;">🎁</div>
              <p>驚喜！你獲得了 ${TREASURE_TYPES[dropped].icon} ${TREASURE_TYPES[dropped].name}</p>
            </div>
          ` : ""}

          <div class="row" style="justify-content:center; margin-top:20px;">
            ${state.levelCorrect >= 3 ? `<button class="btn-success" onclick="nextLevel()">前進下一關</button>` : `<button class="btn-warning" onclick="retryLevel()">重試本關</button>`}
          </div>
        </div>
      `;
      if(isPerfect) createPerfectEffect();
    }

    function nextLevel(){
      state.masteryBits.push(1);
      state.totalCorrect += state.levelCorrect;
      state.totalTotal += state.levelTotal;
      state.currentLevelIndex++;
      state.levelCorrect = 0; state.levelTotal = 0; state.currentQuestionIndex = 0; state.currentCombo = 0;
      if(state.currentLevelIndex >= 4) finishGame();
      else showQuestion();
    }

    function retryLevel(){
      state.levelCorrect = 0; state.levelTotal = 0; state.currentQuestionIndex = 0; state.currentCombo = 0;
      showQuestion();
    }

    /***********************
     * 寶物交換系統 (重點新增)
     ***********************/
    function showExchangeGateway(){
      const modal = document.createElement("div");
      modal.id = "exchangeModal";
      modal.className = "modal-overlay";
      modal.innerHTML = `
        <div class="modal-card">
          <div class="row-between" style="padding:20px;">
            <h2 style="margin:0;">🤝 寶物交換閘門</h2>
            <button class="btn-secondary" onclick="closeExchange()">關閉</button>
          </div>
          <div class="center" style="padding:0 20px 20px;">
            <p>請掃描老師投影幕上的【時間鑰匙】以開啟權限</p>
            <div id="exchangeScannerWrap" class="scanner-video-wrap" style="display:block;">
              <video id="exchangeVideo" autoplay playsinline muted style="width:100%; border-radius:16px;"></video>
            </div>
            <p class="muted" style="margin-top:10px;">密鑰每分鐘更換一次，請確保雙方時間正確</p>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      startScanner("exchangeVideo", (code) => {
        verifyTimeKey(code);
      });
    }

    function verifyTimeKey(code){
      // 代碼格式: TG_KEY|YYMMDDHHmm|VXXXX
      const parts = code.split("|");
      if(parts.length !== 3 || parts[0] !== "TG_KEY") return;
      
      // 校驗碼驗證
      const payload = `TG_KEY|${parts[1]}`;
      if(parts[2] !== calculateVCode(payload)){
        alert("無效的時間鑰匙！");
        return;
      }

      // 時間有效性驗證 (容許 ±2 分鐘誤差)
      const keyTimeStr = parts[1]; // YYMMDDHHmm
      const now = new Date();
      const yy = String(now.getFullYear()).slice(-2);
      const mm = pad2(now.getMonth()+1);
      const dd = pad2(now.getDate());
      const hh = pad2(now.getHours());
      const mi = pad2(now.getMinutes());
      const nowStr = `${yy}${mm}${dd}${hh}${mi}`;

      // 簡單的時間差比對
      const kVal = parseInt(keyTimeStr);
      const nVal = parseInt(nowStr);
      
      if(Math.abs(kVal - nVal) <= 2){
        stopScanner();
        showExchangeInterface();
      } else {
        alert("鑰匙已過期，請掃描老師螢幕上最新的 QR Code！");
      }
    }

    function showExchangeInterface(){
      const wrap = $("exchangeModal").querySelector(".modal-card");
      wrap.innerHTML = `
        <div class="row-between" style="padding:20px;">
          <h2 style="margin:0;">🤝 寶物交換中心</h2>
          <button class="btn-secondary" onclick="closeExchange()">結束交換</button>
        </div>
        <div style="padding:0 20px 20px;">
           <div class="pill" style="width:100%; text-align:center; margin-bottom:15px; background:#fef2f2; color:#dc2626;">
             ⏳ 交換功能將在 3 分鐘後自動關閉
           </div>
           
           <div class="meta-grid">
             <div class="meta-box" onclick="prepGift(0)">
               <div class="label">🌟 金星</div>
               <div class="value">${state.inventory[0]}</div>
               <button class="btn-primary" style="font-size:12px; margin-top:8px;">送出</button>
             </div>
             <div class="meta-box" onclick="prepGift(1)">
               <div class="label">💎 鑽石</div>
               <div class="value">${state.inventory[1]}</div>
               <button class="btn-primary" style="font-size:12px; margin-top:8px;">送出</button>
             </div>
             <div class="meta-box" onclick="prepGift(2)">
               <div class="label">👑 皇冠</div>
               <div class="value">${state.inventory[2]}</div>
               <button class="btn-primary" style="font-size:12px; margin-top:8px;">送出</button>
             </div>
           </div>

           <div class="center" style="margin-top:20px; border-top:1px solid #eee; pt:20px;">
             <h3>接收同學的寶物</h3>
             <div id="receiveScannerWrap" style="width:100%; height:200px; background:#000; border-radius:16px; overflow:hidden;">
               <video id="receiveVideo" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
             </div>
           </div>

           <div id="giftDisplay" class="center hidden" style="margin-top:20px; padding:20px; background:#fffbeb; border-radius:20px;">
             <p id="giftHint" style="font-weight:bold; color:#b45309;"></p>
             <div id="giftQr"></div>
             <p class="muted">⚠️ 產生條碼後已自動扣除寶物<br>請讓同學掃描，關閉視窗後無法取回</p>
           </div>
        </div>
      `;

      startScanner("receiveVideo", (code) => {
        receiveGift(code);
      });

      // 3 分鐘後自動關閉
      setTimeout(() => {
        if($("exchangeModal")) {
          alert("交換時間結束！");
          closeExchange();
        }
      }, 180000);
    }

    function prepGift(typeIdx){
      if(state.inventory[typeIdx] <= 0){
        alert("你沒有這個寶物可以送人喔！");
        return;
      }
      if(!confirm(`確定要送出一個 ${TREASURE_TYPES[typeIdx].name} 嗎？\n⚠️ 送出後將無法取消與退還！`)) return;

      // 扣除寶物
      state.inventory[typeIdx]--;
      showExchangeInterface(); // 刷新顯示

      // 顯示禮物碼
      const giftBox = $("giftDisplay");
      giftBox.classList.remove("hidden");
      $("giftHint").textContent = `🎁 你的禮物：${TREASURE_TYPES[typeIdx].icon} ${TREASURE_TYPES[typeIdx].name}`;
      
      // 禮物碼格式: TG_GIFT|類型索引|隨機碼|校驗碼
      const rand = Math.random().toString(36).slice(-4).toUpperCase();
      const payload = `TG_GIFT|${typeIdx}|${rand}`;
      const fullGiftCode = `${payload}|V${calculateVCode(payload)}`;
      
      renderOfflineQRCode(fullGiftCode, "giftQr");
      giftBox.scrollIntoView({ behavior: 'smooth' });
    }

    function receiveGift(code){
      const parts = code.split("|");
      if(parts.length !== 4 || parts[0] !== "TG_GIFT") return;
      
      // 校驗
      const payload = `TG_GIFT|${parts[1]}|${parts[2]}`;
      if(parts[3] !== calculateVCode(payload)) return;

      // 重複性驗證
      if(state.scannedGifts.includes(parts[2])){
        alert("這個禮物你已經領過了喔！");
        return;
      }

      const typeIdx = parseInt(parts[1]);
      state.inventory[typeIdx]++;
      state.scannedGifts.push(parts[2]);
      
      alert(`🎉 恭喜！收到同學送的 ${TREASURE_TYPES[typeIdx].icon} ${TREASURE_TYPES[typeIdx].name}`);
      showExchangeInterface(); // 刷新介面
    }

    function closeExchange(){
      stopScanner();
      if($("exchangeModal")) $("exchangeModal").remove();
      showQuestion(); // 回到題目頁刷新寶物條
    }

    /***********************
     * jsQR 掃描器引擎
     ***********************/
    let activeStream = null;
    let qrRafId = null;
    const qrCanvas = document.createElement("canvas");
    const qrCtx = qrCanvas.getContext("2d", { willReadFrequently: true });

    async function startScanner(videoId, onScan){
      const v = $(videoId);
      try {
        activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        v.srcObject = activeStream;
        v.setAttribute("playsinline", true);
        v.play();
        qrRafId = requestAnimationFrame(() => scanLoop(v, onScan));
      } catch (err) { alert("相機啟動失敗"); }
    }

    function scanLoop(v, onScan){
      if(v.readyState === v.HAVE_ENOUGH_DATA){
        qrCanvas.width = v.videoWidth;
        qrCanvas.height = v.videoHeight;
        qrCtx.drawImage(v, 0, 0, qrCanvas.width, qrCanvas.height);
        const imgData = qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height);
        if(code && code.data){
          onScan(code.data);
          // 為了讓連續掃描順暢，這裡不自動停止，由邏輯決定何時 stopScanner
        }
      }
      qrRafId = requestAnimationFrame(() => scanLoop(v, onScan));
    }

    function stopScanner(){
      if(activeStream) activeStream.getTracks().forEach(t => t.stop());
      if(qrRafId) cancelAnimationFrame(qrRafId);
    }

    /***********************
     * 基礎工具函式 (存檔、統計、QR 生成)
     ***********************/
    // 這裡請保留您原本 index.html 中的其他函式：
    // confirmLoad, showLoadProgressModal, showStats, finishGame, openForm, 
    // 以及最底下的 QR 生成核心 (renderOfflineQRCode, utf8Bytes, reedSolomonCompute 等)
    // 確保 SECRET_SALT 設為 "TAIGI_MASTER" 以配對 teacher.html
    
    // ... 原有程式碼省略 ...

    window.onload = () => { 
      if(typeof fractalForest !== 'undefined') fractalForest.init(); 
      showStart(); 
    };
  </script>
</body>
</html>
