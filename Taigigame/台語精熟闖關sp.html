<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>台語精熟闖關-寶物交換版</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Huninn&family=Iansui&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="jsQR.js"></script>
  <script src="questions.js"></script>
  <script src="fractal.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>台語精熟闖關</h1>
      <p>iPad 友善版｜積分、連擊與寶物交換系統</p>
    </div>
    <div id="app" class="card"></div>
  </div>

  <div class="fractal-box" aria-hidden="true">
    <canvas id="fractalCanvas" width="180" height="180"></canvas>
  </div>

  <script>
    /***********************
     * 核心設定與狀態
     ***********************/
    const SECRET_SALT = "TAIGI_MASTER";
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScDInn5Vn1UwxYqzeuMhcdZAFE20ErqPURU8zurg_lRsWwbUg/viewform?usp=sharing";

    const state = {
      classCode: "",
      seatNo: "",
      points: 0,
      currentLevelIndex: 0,
      currentQuestionIndex: 0,
      levelCorrect: 0,
      levelTotal: 0,
      totalCorrect: 0,
      totalTotal: 0,
      masteryBits: [],
      finished: false,
      rounds: 1,
      currentCombo: 0,
      inventory: [0, 0, 0], // 金星, 鑽石, 皇冠
      scannedGifts: []      // 防止重複領取
    };

    const TREASURE_TYPES = [
      { name: "金星", icon: "🌟", rate: 0.4 },
      { name: "鑽石", icon: "💎", rate: 0.3 },
      { name: "皇冠", icon: "👑", rate: 0.1 }
    ];

    let activeQuestionBank = [];

    /***********************
     * 工具與結果碼處理
     ***********************/
    function $(id){ return document.getElementById(id); }
    function pad2(n){ return String(n).padStart(2, "0"); }

    function getShortTimestamp(){
      const now = new Date();
      return `${pad2(now.getMonth()+1)}${pad2(now.getDate())}${pad2(now.getHours())}${pad2(now.getMinutes())}`;
    }

    function calculateVCode(payload){
      let hash = 0;
      const str = payload + SECRET_SALT;
      for(let i=0; i<str.length; i++){
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString(36).toUpperCase().slice(-4);
    }

    function generateResultString(){
      const mastery = activeQuestionBank.map((_, idx) => state.masteryBits[idx] ? "1" : "0").join("");
      const invStr = state.inventory.join("");
      const payload = [
        "TG",
        `G${state.classCode}`,
        `N${state.seatNo}`,
        `S${state.points}`,
        `T${state.totalTotal + state.levelTotal}`,
        `C${state.totalCorrect + state.levelCorrect}`,
        `M${mastery}`,
        `B${invStr}`,
        `D${getShortTimestamp()}`,
        `F${state.finished ? 1 : 0}`
      ].join("|");
      return `${payload}|V${calculateVCode(payload)}`;
    }

    function parseResultString(str){
      const raw = String(str || "").trim();
      const parts = raw.split("|");
      if(parts.length < 8 || parts[0] !== "TG") return null;

      const obj = {};
      let payloadParts = [];
      for(const p of parts){
        const key = p.charAt(0);
        obj[key] = p.slice(1);
        if(key !== "V") payloadParts.push(p);
      }

      if(obj.V !== calculateVCode(payloadParts.join("|"))) return { error: "防竄改驗證失敗！結果碼已被修改。" };

      return {
        classCode: obj.G,
        seatNo: obj.N,
        points: Number(obj.S || 0),
        total: Number(obj.T),
        correct: Number(obj.C),
        mastery: obj.M,
        inventory: obj.B ? obj.B.split("").map(Number) : [0, 0, 0],
        timestamp: obj.D,
        finished: obj.F === "1"
      };
    }

    /***********************
     * 畫面邏輯與遊戲流程
     ***********************/
    function showStart(){
      $("app").innerHTML = `
        <div class="screen center">
          <h2>開始挑戰</h2>
          <div class="meta-grid" style="max-width:600px; margin:20px auto;">
            <div>
              <label>班級</label>
              <select id="studentClass">
                <option value="">請選擇</option>
                ${Array.from({length:9}, (_,i)=>701+i).map(c=>`<option value="${c}">${c}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>座號</label>
              <select id="studentSeat">
                <option value="">請選擇</option>
                ${Array.from({length:40}, (_,i)=>i+1).map(n=>`<option value="${pad2(n)}">${n} 號</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="row" style="justify-content:center;">
            <button class="btn-primary" onclick="startGame()">正式挑戰</button>
            <button class="btn-secondary" onclick="showLoadProgressModal()">載入進度</button>
          </div>
        </div>
      `;
    }

    function startGame(){
      const cls = $("studentClass").value;
      const seat = $("studentSeat").value;
      if(!cls || !seat){ alert("請選擇班級與座號"); return; }
      
      resetToHome(false);
      state.classCode = cls;
      state.seatNo = seat;
      activeQuestionBank = buildActiveQuestionBank(DEFAULT_QUESTION_BANK);
      if(typeof fractalForest !== 'undefined') fractalForest.reset();
      showQuestion();
    }

    function buildActiveQuestionBank(qBank){
      const shuffled = [...qBank].sort(() => Math.random() - 0.5);
      const levels = [];
      for(let i=0; i<4; i++){
        const qs = shuffled.slice(i*5, (i+1)*5).map(q => {
          const opts = [...q.options];
          const ansText = opts[q.answer-1];
          opts.sort(() => Math.random() - 0.5);
          return { q: q.q, options: opts, answer: opts.indexOf(ansText) };
        });
        levels.push({ level: i+1, questions: qs });
      }
      return levels;
    }

    function showQuestion(){
      $("app").innerHTML = `
        <div class="screen">
          <div class="row-between">
            <div class="pill">Level ${state.currentLevelIndex + 1} | Q ${state.currentQuestionIndex + 1}/5</div>
            <div class="pill" style="color:#d97706; background:#fffbeb;">積分：${state.points}</div>
          </div>
          <div class="row-between" style="margin-top:10px;">
             <div class="student-badge">${state.classCode} 班 ${Number(state.seatNo)} 號</div>
             <div class="pill" style="background:#f3f4f6; color:#374151;">
               ${TREASURE_TYPES.map((t, i) => `<span>${t.icon} ${state.inventory[i]}</span>`).join(" &nbsp; ")}
             </div>
          </div>
          <div class="question-box">
            <p class="question-title">${activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex].q}</p>
            <div class="options">
              ${activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex].options.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`).join("")}
            </div>
            <div id="feedback" class="feedback"></div>
          </div>
          <div class="row" style="justify-content:center; gap:10px; margin-top:16px;">
            <button class="btn-primary" style="background:#4f46e5" onclick="showExchangeGateway()">🤝 寶物交換區</button>
            <button class="btn-secondary" onclick="showStats()">統計卡片</button>
            <button class="btn-warning" onclick="saveProgressModal()">💾 中途存檔</button>
          </div>
        </div>
      `;
    }

    function checkAnswer(idx){
      const q = activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex];
      const isCorrect = idx === q.answer;
      state.levelTotal++;
      
      let earned = 0;
      if(isCorrect){
        state.levelCorrect++;
        state.currentCombo++;
        earned = 10 + (state.currentCombo - 1) * 2;
        state.points += earned;
      } else {
        state.currentCombo = 0;
      }
      
      if(typeof fractalForest !== 'undefined') fractalForest.grow();
      const fb = $("feedback");
      fb.className = isCorrect ? "feedback success" : "feedback error";
      fb.innerHTML = isCorrect ? `答對了！積分 +${earned}${state.currentCombo>1?` (🔥${state.currentCombo}連擊)` : ""}` : "答錯了。";
      fb.style.display = "block";
      
      if(isCorrect && state.currentCombo > 1) createBonusEffect(state.currentCombo, earned);

      document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
      setTimeout(() => {
        state.currentQuestionIndex++;
        if(state.currentQuestionIndex >= 5) finishLevel();
        else showQuestion();
      }, 1000);
    }

    function finishLevel(){
      const isPerfect = state.levelCorrect === 5;
      if(isPerfect) state.points += 30;

      let dropped = null;
      const roll = Math.random();
      if(roll < 0.1) dropped = 2; // 皇冠
      else if(roll < 0.4) dropped = 1; // 鑽石
      else if(roll < 0.8) dropped = 0; // 金星

      if(dropped !== null) state.inventory[dropped]++;

      $("app").innerHTML = `
        <div class="screen center">
          ${isPerfect ? `<div class="perfect-badge">💯 完美過關！+30 積分</div>` : `<h2>Level ${state.currentLevelIndex+1} 結束</h2>`}
          <div class="meta-box" style="margin:20px auto; max-width:240px;">
            <div class="label">本關得分</div><div class="value">${state.levelCorrect}/5</div>
          </div>
          ${dropped !== null ? `
            <div style="margin:20px 0; padding:15px; background:#fffbeb; border-radius:16px;">
              <div style="font-size:40px;">🎁</div>
              <p style="font-weight:bold; color:#b45309; margin:5px 0 0;">驚喜！獲得 ${TREASURE_TYPES[dropped].icon} ${TREASURE_TYPES[dropped].name}</p>
            </div>
          ` : ""}
          <div class="row" style="justify-content:center; margin-top:20px;">
            ${state.levelCorrect >= 3 ? `<button class="btn-success" onclick="nextLevel()">前進下一關</button>` : `<button class="btn-warning" onclick="retryLevel()">重試本關</button>`}
          </div>
        </div>
      `;
      if(isPerfect) createPerfectEffect();
    }

    function nextLevel(){
      state.masteryBits.push(1);
      state.totalCorrect += state.levelCorrect;
      state.totalTotal += state.levelTotal;
      state.currentLevelIndex++;
      state.levelCorrect = 0; state.levelTotal = 0; state.currentQuestionIndex = 0; state.currentCombo = 0;
      if(state.currentLevelIndex >= 4) finishGame();
      else showQuestion();
    }

    function retryLevel(){
      state.levelCorrect = 0; state.levelTotal = 0; state.currentQuestionIndex = 0; state.currentCombo = 0;
      showQuestion();
    }

    function finishGame(){
      state.finished = true;
      const res = generateResultString();
      $("app").innerHTML = `
        <div class="screen center">
          <h2>闖關完成！</h2>
          <div class="meta-grid">
            <div class="meta-box"><div class="label">總積分</div><div class="value">${state.points}</div></div>
            <div class="meta-box"><div class="label">正確率</div><div class="value">${Math.round(state.totalCorrect/state.totalTotal*100)}%</div></div>
          </div>
          <div class="result-code" id="resCode">${res}</div>
          <div id="qrcode"></div>
          <div class="row" style="justify-content:center; margin-top:20px;">
            <button class="btn-primary" onclick="startNewRound()">開啟新一輪挑戰</button>
            <button class="btn-success" onclick="openForm('${res.replace(/'/g, "\\'")}')">上傳 Google 表單</button>
          </div>
          <div class="row" style="justify-content:center; margin-top:10px;">
            <button class="btn-secondary" onclick="resetToHome(true)">換下一位挑戰 (返回首頁)</button>
          </div>
        </div>
      `;
      renderOfflineQRCode(res, "qrcode");
    }

    function resetToHome(goStart = true){
      state.points = 0; state.currentLevelIndex = 0; state.currentQuestionIndex = 0;
      state.levelCorrect = 0; state.levelTotal = 0; state.totalCorrect = 0;
      state.totalTotal = 0; state.masteryBits = []; state.finished = false;
      state.currentCombo = 0; state.inventory = [0,0,0]; state.scannedGifts = [];
      if(goStart) showStart();
    }

    function startNewRound(){
      if(!confirm(`你是「${state.classCode} 班 ${Number(state.seatNo)} 號」嗎？\n✅ 確定則保留積分與寶物繼續挑戰`)) {
        resetToHome(true); return;
      }
      state.rounds++;
      state.currentLevelIndex = 0; state.currentQuestionIndex = 0;
      state.levelCorrect = 0; state.levelTotal = 0; state.masteryBits = [];
      state.finished = false; state.currentCombo = 0;
      activeQuestionBank = buildActiveQuestionBank(DEFAULT_QUESTION_BANK);
      if(typeof fractalForest !== 'undefined') fractalForest.reset();
      showQuestion();
    }

    /***********************
     * 寶物交換系統
     ***********************/
    function showExchangeGateway(){
      const modal = document.createElement("div");
      modal.id = "exchangeModal";
      modal.className = "modal-overlay";
      modal.innerHTML = `
        <div class="modal-card">
          <div class="row-between" style="padding:20px;">
            <h2 style="margin:0;">🤝 寶物交換閘門</h2>
            <button class="btn-secondary" onclick="closeExchange()">關閉</button>
          </div>
          <div class="center" style="padding:0 20px 20px;">
            <p>請掃描老師投影幕上的【時間鑰匙】解鎖</p>
            <div id="exchangeScannerWrap" class="scanner-video-wrap" style="display:block;">
              <video id="exchangeVideo" autoplay playsinline muted style="width:100%; max-width:400px; border-radius:16px;"></video>
            </div>
            <p class="muted" style="margin-top:10px;">密鑰每分鐘更換一次，請確保時間正確</p>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      startScanner("exchangeVideo", (code) => { verifyTimeKey(code); });
    }

    function verifyTimeKey(code){
      const parts = code.split("|");
      if(parts.length !== 3 || parts[0] !== "TG_KEY") return;
      
      const payload = `TG_KEY|${parts[1]}`;
      if(parts[2] !== calculateVCode(payload)){ alert("無效的時間鑰匙！"); return; }

      const keyTimeStr = parts[1]; 
      const now = new Date();
      const nowStr = `${String(now.getFullYear()).slice(-2)}${pad2(now.getMonth()+1)}${pad2(now.getDate())}${pad2(now.getHours())}${pad2(now.getMinutes())}`;

      if(Math.abs(parseInt(keyTimeStr) - parseInt(nowStr)) <= 2){
        stopScanner();
        showExchangeInterface();
      } else {
        alert("鑰匙已過期，請掃描螢幕上最新的 QR Code！");
      }
    }

    function showExchangeInterface(){
      const wrap = $("exchangeModal").querySelector(".modal-card");
      wrap.innerHTML = `
        <div class="row-between" style="padding:20px;">
          <h2 style="margin:0;">🤝 寶物交換中心</h2>
          <button class="btn-secondary" onclick="closeExchange()">結束交換</button>
        </div>
        <div style="padding:0 20px 20px;">
           <div class="meta-grid">
             <div class="meta-box" onclick="prepGift(0)" style="cursor:pointer; text-align:center;">
               <div class="label">🌟 金星</div><div class="value">${state.inventory[0]}</div>
               <button class="btn-primary" style="font-size:14px; margin-top:8px; width:100%;">送出</button>
             </div>
             <div class="meta-box" onclick="prepGift(1)" style="cursor:pointer; text-align:center;">
               <div class="label">💎 鑽石</div><div class="value">${state.inventory[1]}</div>
               <button class="btn-primary" style="font-size:14px; margin-top:8px; width:100%;">送出</button>
             </div>
             <div class="meta-box" onclick="prepGift(2)" style="cursor:pointer; text-align:center;">
               <div class="label">👑 皇冠</div><div class="value">${state.inventory[2]}</div>
               <button class="btn-primary" style="font-size:14px; margin-top:8px; width:100%;">送出</button>
             </div>
           </div>

           <div class="center" style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
             <h3 style="margin-bottom:10px;">📥 掃描接收同學的寶物</h3>
             <div style="width:100%; max-width:400px; margin:0 auto; border-radius:16px; overflow:hidden;">
               <video id="receiveVideo" autoplay playsinline muted style="width:100%; background:#000; display:block;"></video>
             </div>
           </div>

           <div id="giftDisplay" class="center hidden" style="margin-top:20px; padding:20px; background:#fffbeb; border-radius:20px;">
             <p id="giftHint" style="font-weight:bold; color:#b45309;"></p>
             <div id="giftQr"></div>
             <p class="muted" style="margin-top:10px;">⚠️ 寶物已扣除！請同學掃描，關閉後無法取回</p>
           </div>
        </div>
      `;
      startScanner("receiveVideo", (code) => { receiveGift(code); });
      setTimeout(() => { if($("exchangeModal")) { alert("交換時間結束！"); closeExchange(); } }, 180000);
    }

    function prepGift(typeIdx){
      if(state.inventory[typeIdx] <= 0){ alert("你沒有這個寶物可以送人喔！"); return; }
      if(!confirm(`確定要送出一個 ${TREASURE_TYPES[typeIdx].name} 嗎？\n⚠️ 送出後將無法取消與退還！`)) return;

      state.inventory[typeIdx]--;
      showExchangeInterface(); 

      const giftBox = $("giftDisplay");
      giftBox.classList.remove("hidden");
      $("giftHint").textContent = `🎁 你的禮物：${TREASURE_TYPES[typeIdx].icon} ${TREASURE_TYPES[typeIdx].name}`;
      
      const rand = Math.random().toString(36).slice(-4).toUpperCase();
      const payload = `TG_GIFT|${typeIdx}|${rand}`;
      renderOfflineQRCode(`${payload}|V${calculateVCode(payload)}`, "giftQr");
      giftBox.scrollIntoView({ behavior: 'smooth' });
    }

    function receiveGift(code){
      const parts = code.split("|");
      if(parts.length !== 4 || parts[0] !== "TG_GIFT") return;
      
      const payload = `TG_GIFT|${parts[1]}|${parts[2]}`;
      if(parts[3] !== calculateVCode(payload)) return;

      if(state.scannedGifts.includes(parts[2])){
        alert("這個禮物你已經領過了喔！"); return;
      }

      const typeIdx = parseInt(parts[1]);
      state.inventory[typeIdx]++;
      state.scannedGifts.push(parts[2]);
      alert(`🎉 恭喜！收到同學送的 ${TREASURE_TYPES[typeIdx].icon} ${TREASURE_TYPES[typeIdx].name}`);
      showExchangeInterface();
    }

    function closeExchange(){
      stopScanner();
      if($("exchangeModal")) $("exchangeModal").remove();
      showQuestion();
    }

    /***********************
     * jsQR 相機掃描引擎
     ***********************/
    let activeStream = null;
    let qrRafId = null;
    const qrCanvas = document.createElement("canvas");
    const qrCtx = qrCanvas.getContext("2d", { willReadFrequently: true });

    async function startScanner(videoId, onScan){
      const v = $(videoId);
      if(!v) return;
      try {
        activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        v.srcObject = activeStream;
        v.setAttribute("playsinline", true);
        v.play();
        qrRafId = requestAnimationFrame(() => scanLoop(v, onScan));
      } catch (err) { 
        alert("相機啟動失敗，請確認已授權網頁使用相機！"); 
      }
    }

    function scanLoop(v, onScan){
      if(v.readyState === v.HAVE_ENOUGH_DATA){
        qrCanvas.width = v.videoWidth;
        qrCanvas.height = v.videoHeight;
        qrCtx.drawImage(v, 0, 0, qrCanvas.width, qrCanvas.height);
        const imgData = qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });
        if(code && code.data){
          onScan(code.data);
        }
      }
      qrRafId = requestAnimationFrame(() => scanLoop(v, onScan));
    }

    function stopScanner(){
      if(activeStream) activeStream.getTracks().forEach(t => t.stop());
      if(qrRafId) cancelAnimationFrame(qrRafId);
    }

    /***********************
     * 載入進度與統計卡片 (Modal)
     ***********************/
    function showLoadProgressModal(){
      const modal = document.createElement("div");
      modal.id = "loadModal";
      modal.className = "modal-overlay";
      modal.innerHTML = `
        <div class="modal-card">
          <div class="row-between" style="padding:20px;">
            <h2 style="margin:0;">載入進度</h2><button class="btn-secondary" onclick="closeLoadModal()">關閉</button>
          </div>
          <div class="parse-panel" style="margin:0 20px 20px;">
            <p class="muted">1. 請先在首頁選好班級與座號</p>
            <button class="btn-success" style="width:100%; margin-bottom:10px;" onclick="$('loadQrVideoWrap').style.display='block'; startScanner('loadQrVideo', (code) => { $('loadInput').value=code; stopScanner(); confirmLoad(); })">開啟相機掃描 QR</button>
            <div id="loadQrVideoWrap" class="scanner-video-wrap" style="display:none;">
              <video id="loadQrVideo" autoplay playsinline muted style="width:100%; border-radius:16px; background:#000;"></video>
            </div>
            <textarea id="loadInput" placeholder="或在此貼上結果碼..."></textarea>
            <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="confirmLoad()">確定載入</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function confirmLoad(){
      const raw = $("loadInput").value.trim();
      const curCls = $("studentClass").value;
      const curSeat = $("studentSeat").value;
      if(!curCls || !curSeat){ alert("載入前請先選擇班級與座號！"); return; }

      const p = parseResultString(raw);
      if(!p || p.error){ alert(p ? p.error : "格式錯誤！"); return; }
      if(p.classCode !== curCls || p.seatNo !== curSeat){ alert("身分不符！這不是你的專屬進度碼。"); return; }

      state.classCode = p.classCode; state.seatNo = p.seatNo; state.points = p.points;
      state.totalCorrect = p.correct; state.totalTotal = p.total;
      state.masteryBits = p.mastery.split("").map(Number);
      state.inventory = p.inventory;
      
      if (p.finished) { state.currentLevelIndex = 0; state.masteryBits = []; state.finished = false; } 
      else { state.currentLevelIndex = Math.min(state.masteryBits.length, 3); }
      
      state.currentQuestionIndex = 0; state.levelCorrect = 0; state.levelTotal = 0; state.currentCombo = 0;
      activeQuestionBank = buildActiveQuestionBank(DEFAULT_QUESTION_BANK);
      closeLoadModal(); alert(`載入成功！目前累積積分：${state.points}`); showQuestion();
    }
    
    function closeLoadModal(){ stopScanner(); if($("loadModal")) $("loadModal").remove(); }

    function saveProgressModal(){
      const prog = Math.round((state.currentLevelIndex * 5 + state.currentQuestionIndex + 1) / 20 * 100);
      const res = generateResultString();
      const modal = document.createElement("div");
      modal.id = "saveModal"; modal.className = "modal-overlay";
      modal.innerHTML = `
        <div class="modal-card">
          <div class="row-between" style="padding:20px;"><h2>💾 中途進度存檔</h2><button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">關閉</button></div>
          <div class="parse-panel" style="margin:0 20px 20px;">
            <div class="meta-grid">
              <div class="meta-box"><div class="label">總進度</div><div class="value">${prog}%</div></div>
              <div class="meta-box"><div class="label">目前積分</div><div class="value">${state.points}</div></div>
            </div>
            <div style="margin-top:18px; padding:14px; background:#f0f4ff; border-radius:12px;">
              <p class="muted">你的進度碼：</p><div class="result-code" style="font-size:12px;">${res}</div>
              <button class="btn-primary" style="width:100%; margin-top:10px;" onclick="fallbackCopyToClipboard('${res.replace(/'/g, "\\'")}')">📋 複製進度碼</button>
            </div>
            <button class="btn-success" style="width:100%; margin-top:10px;" onclick="openForm('${res.replace(/'/g, "\\'")}')">🌐 上傳表單</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      fallbackCopyToClipboard(res);
    }

    function showStats(){
      const modal = document.createElement("div");
      modal.id = "statsModal"; modal.className = "modal-overlay";
      modal.innerHTML = `
        <div class="modal-card">
          <div class="row-between" style="padding:20px;"><h2>進度卡片</h2><button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">關閉</button></div>
          <div class="meta-grid" style="margin:0 20px;">
            <div class="meta-box"><div class="label">本輪正確</div><div class="value">${state.levelCorrect}/${state.levelTotal}</div></div>
            <div class="meta-box"><div class="label">累計積分</div><div class="value">${state.points}</div></div>
          </div>
          <div id="statsQrcode" style="margin:20px;"></div>
        </div>`;
      document.body.appendChild(modal);
      renderOfflineQRCode(generateResultString(), "statsQrcode");
    }

    function openForm(res){
      fallbackCopyToClipboard(res);
      alert("✓ 代碼已複製！現在開啟表單貼上即可。");
      window.open(GOOGLE_FORM_URL, "_blank");
    }

    function fallbackCopyToClipboard(text){
      const t = document.createElement("textarea");
      t.value = text; document.body.appendChild(t); t.select();
      try { document.execCommand("copy"); } catch(e){}
      document.body.removeChild(t);
    }

    function createBonusEffect(combo, pts){
      const popup = document.createElement("div");
      popup.className = `combo-popup ${combo > 4 ? 'amazing' : combo > 2 ? 'great' : 'good'}`;
      popup.textContent = `+${pts}`;
      popup.style.left = (window.innerWidth / 2) + "px"; popup.style.top = (window.innerHeight / 2) + "px";
      document.body.appendChild(popup); setTimeout(() => popup.remove(), 1500);
      if(combo > 2){
        const emojis = ["🎉", "✨", "🔥", "🚀", "🌟", "💯"];
        for(let i=0; i<(combo>4?3:1); i++){
          const e = document.createElement("div"); e.className = "emoji-burst";
          e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
          e.style.left = "50%"; e.style.top = "50%";
          e.style.setProperty("--tx", (Math.random()*200-100)+"px"); e.style.setProperty("--ty", (Math.random()*200-100)+"px");
          document.body.appendChild(e); setTimeout(() => e.remove(), 1500);
        }
      }
    }
    function createPerfectEffect(){
      for(let i=0; i<5; i++){
        const star = document.createElement("div"); star.className = "star-twinkle"; star.textContent = "⭐";
        star.style.left = Math.random()*100+"%"; star.style.top = Math.random()*100+"%";
        document.body.appendChild(star); setTimeout(() => star.remove(), 3000);
      }
    }

    /***********************
     * QR Code 離線生成演算法 (完整無刪減)
     ***********************/
    const QR_V3_SIZE = 29; const QR_DATA_CODEWORDS = 55; const QR_ECC_CODEWORDS = 15;
    const QR_FORMAT_INFO_L = { 0:0b111011111000100, 1:0b111001011110011, 2:0b111110110101010, 3:0b111100010011101, 4:0b110011000101111, 5:0b110001100011000, 6:0b110110001000001, 7:0b110100101110110 };

    function renderOfflineQRCode(text, targetId = "qrcode"){
      const bytes = utf8Bytes(text);
      if(bytes.length > 53) throw new Error("結果字串過長，超出容量。");
      const dataCodewords = makeQRDataCodewords(bytes);
      const ecc = reedSolomonCompute(dataCodewords, QR_ECC_CODEWORDS);
      const allCodewords = dataCodewords.concat(ecc);
      let bestMatrix = null; let bestPenalty = Infinity;
      for(let mask = 0; mask < 8; mask++){
        const {modules, isFunction} = buildBaseMatrixV3();
        placeDataBits(modules, isFunction, allCodewords); applyMask(modules, isFunction, mask); drawFormatInfo(modules, mask);
        const penalty = calcPenalty(modules);
        if(penalty < bestPenalty){ bestPenalty = penalty; bestMatrix = modules.map(row => row.slice()); }
      }
      drawMatrixToCanvas(bestMatrix, 8, 4, targetId);
    }
    function utf8Bytes(str){ return Array.from(new TextEncoder().encode(str)); }
    function makeQRDataCodewords(bytes){
      const bits = []; pushBits(bits, 0b0100, 4); pushBits(bits, bytes.length, 8);
      for(const b of bytes) pushBits(bits, b, 8);
      const maxBits = QR_DATA_CODEWORDS * 8;
      let terminator = Math.min(4, maxBits - bits.length);
      for(let i = 0; i < terminator; i++) bits.push(0);
      while(bits.length % 8 !== 0) bits.push(0);
      const codewords = [];
      for(let i = 0; i < bits.length; i += 8){
        let val = 0; for(let j = 0; j < 8; j++) val = (val << 1) | bits[i + j];
        codewords.push(val);
      }
      const pads = [0xEC, 0x11]; let p = 0;
      while(codewords.length < QR_DATA_CODEWORDS){ codewords.push(pads[p % 2]); p++; }
      return codewords;
    }
    function pushBits(arr, val, count){ for(let i = count - 1; i >= 0; i--) arr.push((val >>> i) & 1); }
    function buildBaseMatrixV3(){
      const size = QR_V3_SIZE; const modules = Array.from({length:size}, () => Array(size).fill(false)); const isFunction = Array.from({length:size}, () => Array(size).fill(false));
      function set(x, y, dark, func=true){ if(x < 0 || y < 0 || x >= size || y >= size) return; modules[y][x] = !!dark; if(func) isFunction[y][x] = true; }
      function drawFinder(x, y){
        for(let dy = -1; dy <= 7; dy++) for(let dx = -1; dx <= 7; dx++){
          const xx = x + dx, yy = y + dy; const inRange = dx >= 0 && dx <= 6 && dy >= 0 && dy <= 6; let dark = false;
          if(inRange){ if(dx === 0 || dx === 6 || dy === 0 || dy === 6) dark = true; else if(dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4) dark = true; }
          set(xx, yy, dark, true);
        }
      }
      function drawAlignment(cx, cy){
        for(let dy = -2; dy <= 2; dy++) for(let dx = -2; dx <= 2; dx++){ const dist = Math.max(Math.abs(dx), Math.abs(dy)); set(cx + dx, cy + dy, dist !== 1, true); }
      }
      drawFinder(0, 0); drawFinder(size - 7, 0); drawFinder(0, size - 7);
      for(let i = 8; i < size - 8; i++){ set(i, 6, i % 2 === 0, true); set(6, i, i % 2 === 0, true); }
      drawAlignment(22, 22); set(8, size - 8, true, true);
      for(let i = 0; i < 9; i++) if(i !== 6){ set(8, i, false, true); set(i, 8, false, true); }
      for(let i = 0; i < 8; i++){ set(size - 1 - i, 8, false, true); set(8, size - 1 - i, false, true); }
      return {modules, isFunction};
    }
    function placeDataBits(modules, isFunction, codewords){
      const size = modules.length; const bits = [];
      for(const cw of codewords) for(let i = 7; i >= 0; i--) bits.push((cw >>> i) & 1);
      let bitIndex = 0; let upward = true;
      for(let right = size - 1; right >= 1; right -= 2){
        if(right === 6) right--;
        for(let vert = 0; vert < size; vert++){
          const y = upward ? (size - 1 - vert) : vert;
          for(let j = 0; j < 2; j++){ const x = right - j; if(isFunction[y][x]) continue; const bit = bitIndex < bits.length ? bits[bitIndex] : 0; modules[y][x] = !!bit; bitIndex++; }
        }
        upward = !upward;
      }
    }
    function maskBit(mask, x, y){
      switch(mask){
        case 0: return ((x + y) % 2) === 0; case 1: return (y % 2) === 0; case 2: return (x % 3) === 0; case 3: return ((x + y) % 3) === 0;
        case 4: return ((Math.floor(y / 2) + Math.floor(x / 3)) % 2) === 0; case 5: return (((x * y) % 2) + ((x * y) % 3)) === 0;
        case 6: return ((((x * y) % 2) + ((x * y) % 3)) % 2) === 0; case 7: return ((((x + y) % 2) + ((x * y) % 3)) % 2) === 0; default: return false;
      }
    }
    function applyMask(modules, isFunction, mask){
      const size = modules.length;
      for(let y = 0; y < size; y++) for(let x = 0; x < size; x++) if(!isFunction[y][x] && maskBit(mask, x, y)) modules[y][x] = !modules[y][x];
    }
    function drawFormatInfo(modules, mask){
      const size = modules.length; const data = QR_FORMAT_INFO_L[mask]; const getBit = i => ((data >>> i) & 1) !== 0;
      for(let i = 0; i <= 5; i++) modules[8][i] = getBit(14 - i);
      modules[8][7] = getBit(8); modules[8][8] = getBit(7); modules[7][8] = getBit(6);
      for(let i = 5; i >= 0; i--) modules[i][8] = getBit(5 - i);
      for(let i = 0; i < 8; i++) modules[8][size - 1 - i] = getBit(i);
      for(let i = 0; i < 7; i++) modules[size - 7 + i][8] = getBit(14 - i);
    }
    function calcPenalty(modules){
      const size = modules.length; let penalty = 0;
      for(let y = 0; y < size; y++){
        let runColor = modules[y][0], runLen = 1;
        for(let x = 1; x < size; x++){ if(modules[y][x] === runColor) runLen++; else{ if(runLen >= 5) penalty += 3 + (runLen - 5); runColor = modules[y][x]; runLen = 1; } }
        if(runLen >= 5) penalty += 3 + (runLen - 5);
      }
      for(let x = 0; x < size; x++){
        let runColor = modules[0][x], runLen = 1;
        for(let y = 1; y < size; y++){ if(modules[y][x] === runColor) runLen++; else{ if(runLen >= 5) penalty += 3 + (runLen - 5); runColor = modules[y][x]; runLen = 1; } }
        if(runLen >= 5) penalty += 3 + (runLen - 5);
      }
      for(let y = 0; y < size - 1; y++) for(let x = 0; x < size - 1; x++){ const c = modules[y][x]; if(modules[y][x+1] === c && modules[y+1][x] === c && modules[y+1][x+1] === c) penalty += 3; }
      const p1 = [true,false,true,true,true,false,true,false,false,false,false], p2 = [false,false,false,false,true,false,true,true,true,false,true];
      function sameSeq(arr, start, pattern){ for(let i = 0; i < pattern.length; i++) if(arr[start + i] !== pattern[i]) return false; return true; }
      for(let y = 0; y < size; y++){ const row = modules[y]; for(let x = 0; x <= size - 11; x++) if(sameSeq(row, x, p1) || sameSeq(row, x, p2)) penalty += 40; }
      for(let x = 0; x < size; x++){ const col = []; for(let y = 0; y < size; y++) col.push(modules[y][x]); for(let y = 0; y <= size - 11; y++) if(sameSeq(col, y, p1) || sameSeq(col, y, p2)) penalty += 40; }
      let dark = 0; for(let y = 0; y < size; y++) for(let x = 0; x < size; x++) if(modules[y][x]) dark++;
      penalty += Math.floor(Math.abs((dark * 100 / (size * size)) - 50) / 5) * 10;
      return penalty;
    }
    function drawMatrixToCanvas(matrix, scale = 8, border = 4, targetId = "qrcode"){
      const size = matrix.length; const full = size + border * 2; const canvas = document.createElement("canvas");
      canvas.width = full * scale; canvas.height = full * scale; const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#000000";
      for(let y = 0; y < size; y++) for(let x = 0; x < size; x++) if(matrix[y][x]) ctx.fillRect((x + border) * scale, (y + border) * scale, scale, scale);
      const wrap = document.getElementById(targetId); if(wrap){ wrap.innerHTML = ""; wrap.appendChild(canvas); }
    }
    const GF_EXP = new Array(512).fill(0); const GF_LOG = new Array(256).fill(0);
    (function initGF(){ let x = 1; for(let i = 0; i < 255; i++){ GF_EXP[i] = x; GF_LOG[x] = i; x <<= 1; if(x & 0x100) x ^= 0x11D; } for(let i = 255; i < 512; i++) GF_EXP[i] = GF_EXP[i - 255]; })();
    function gfMul(a, b){ if(a === 0 || b === 0) return 0; return GF_EXP[GF_LOG[a] + GF_LOG[b]]; }
    function polyMultiply(p, q){ const out = new Array(p.length + q.length - 1).fill(0); for(let i = 0; i < p.length; i++) for(let j = 0; j < q.length; j++) out[i + j] ^= gfMul(p[i], q[j]); return out; }
    function rsGeneratorPoly(degree){ let poly = [1]; for(let i = 0; i < degree; i++) poly = polyMultiply(poly, [1, GF_EXP[i]]); return poly; }
    function reedSolomonCompute(data, eccLen){
      const gen = rsGeneratorPoly(eccLen); const res = new Array(eccLen).fill(0);
      for(const b of data){ const factor = b ^ res[0]; res.shift(); res.push(0); for(let i = 0; i < eccLen; i++) res[i] ^= gfMul(gen[i + 1], factor); }
      return res;
    }

    // 頁面初始化
    window.onload = () => {
      if(typeof fractalForest !== 'undefined') fractalForest.init();
      showStart();
    };
  </script>
