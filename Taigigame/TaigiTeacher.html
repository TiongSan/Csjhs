<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台語精熟闖關-老師密鑰產生器</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
  background: var(--card);
  padding: 40px 60px;
  border-radius: 32px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  width: 95%;
  max-width: 1000px; /* 改寬度適應大螢幕 */
  display: grid;
  grid-template-columns: 1fr auto; /* 切成左右兩欄 */
  align-items: center;
  column-gap: 50px;
  text-align: left; /* 文字改靠左 */
}

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #94a3b8;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      background: #065f46;
      color: #34d399;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #clock {
      font-size: 80px;
      font-weight: 900;
      margin: 10px 0;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    #qrcode-container {
  background: #fff;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(37, 99, 235, 0.2);
  grid-column: 2; /* 強制放在右側欄位 */
  grid-row: 1 / span 3; /* 垂直跨越左側的文字高度 */
  margin: 0;
}

    /* 確保投影在大螢幕上也很清晰 */
    #qrcode canvas {
      display: block;
      width: 100%;
      max-width: 320px;
      height: auto;
      image-rendering: pixelated; 
    }

    .progress-wrap {
      width: 100%;
      height: 12px;
      background: #334155;
      border-radius: 999px;
      margin-top: 20px;
      overflow: hidden;
    }

    #progress-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      transition: width 1s linear;
    }

    .hint {
      margin-top: 20px;
      color: #64748b;
      font-size: 16px;
    }

    .key-string {
      font-family: monospace;
      color: #475569;
      font-size: 12px;
      margin-top: 10px;
      word-break: break-all;
    }
    .progress-wrap, .hint, .key-string {
  grid-column: 1 / span 2; /* 橫跨左右兩欄 */
  text-align: center;
}
  </style>
</head>
<body>

  <div class="container">
    <h1>台語精熟闖關｜時間鑰匙</h1>
    <div class="status-badge">● 交換功能開放中</div>
    
    <div id="clock">00:00:00</div>

    <div id="qrcode-container">
      <div id="qrcode"></div>
    </div>

    <div class="progress-wrap">
      <div id="progress-bar"></div>
    </div>

    <p class="hint">請學生掃描上方 QR Code 以解鎖交換功能<br><small>密鑰每 60 秒自動更新一次</small></p>
    <div id="debug-string" class="key-string"></div>
  </div>

  <script>
    /***********************
     * 1. 動態時間密鑰邏輯
     ***********************/
    const SECRET_SALT = "TAIGI_MASTER"; // 必須與學生端一致

    function pad2(n) { return String(n).padStart(2, "0"); }

    function getTimestampString() {
      const now = new Date();
      const yy = String(now.getFullYear()).slice(-2);
      const mm = pad2(now.getMonth() + 1);
      const dd = pad2(now.getDate());
      const hh = pad2(now.getHours());
      const mi = pad2(now.getMinutes());
      return `${yy}${mm}${dd}${hh}${mi}`;
    }

    function calculateVCode(payload) {
      let hash = 0;
      const str = payload + SECRET_SALT;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString(36).toUpperCase().slice(-4);
    }

    let lastKey = "";

    function updateKey() {
      const now = new Date();
      const seconds = now.getSeconds();
      
      document.getElementById('clock').textContent = 
        `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(seconds)}`;

      const remaining = 60 - seconds;
      document.getElementById('progress-bar').style.width = (remaining / 60 * 100) + "%";

      const ts = getTimestampString();
      const payload = `TG_KEY|${ts}`;
      const fullKey = `${payload}|V${calculateVCode(payload)}`;

      // 只有當密鑰真的改變時（每分鐘跨越時），才重新繪製 QR Code
      if (fullKey !== lastKey) {
        lastKey = fullKey;
        document.getElementById('debug-string').textContent = fullKey;
        renderOfflineQRCode(fullKey, 'qrcode');
      }
    }


    /***********************
     * 2. 離線 QR Code 核心引擎 (完整無刪減版)
     ***********************/
    const QR_V3_SIZE = 29;
    const QR_DATA_CODEWORDS = 55;
    const QR_ECC_CODEWORDS = 15;
    const QR_FORMAT_INFO_L = {
      0: 0b111011111000100, 1: 0b111001011110011, 2: 0b111110110101010, 3: 0b111100010011101,
      4: 0b110011000101111, 5: 0b110001100011000, 6: 0b110110001000001, 7: 0b110100101110110
    };

    function renderOfflineQRCode(text, targetId = "qrcode"){
      const bytes = utf8Bytes(text);
      if(bytes.length > 53){
        throw new Error("結果字串過長，超出目前內建 QR 容量。");
      }
      const dataCodewords = makeQRDataCodewords(bytes);
      const ecc = reedSolomonCompute(dataCodewords, QR_ECC_CODEWORDS);
      const allCodewords = dataCodewords.concat(ecc);

      let bestMatrix = null;
      let bestPenalty = Infinity;

      for(let mask = 0; mask < 8; mask++){
        const {modules, isFunction} = buildBaseMatrixV3();
        placeDataBits(modules, isFunction, allCodewords);
        applyMask(modules, isFunction, mask);
        drawFormatInfo(modules, mask);
        const penalty = calcPenalty(modules);
        if(penalty < bestPenalty){
          bestPenalty = penalty;
          bestMatrix = modules.map(row => row.slice());
        }
      }
      // 將 scale 調到 12，讓大螢幕投影更清晰
      drawMatrixToCanvas(bestMatrix, 12, 4, targetId);
    }

    function utf8Bytes(str){
      return Array.from(new TextEncoder().encode(str));
    }

    function makeQRDataCodewords(bytes){
      const bits = [];
      pushBits(bits, 0b0100, 4);
      pushBits(bits, bytes.length, 8);
      for(const b of bytes) pushBits(bits, b, 8);

      const maxBits = QR_DATA_CODEWORDS * 8;
      let terminator = Math.min(4, maxBits - bits.length);
      for(let i = 0; i < terminator; i++) bits.push(0);
      while(bits.length % 8 !== 0) bits.push(0);

      const codewords = [];
      for(let i = 0; i < bits.length; i += 8){
        let val = 0;
        for(let j = 0; j < 8; j++) val = (val << 1) | bits[i + j];
        codewords.push(val);
      }

      const pads = [0xEC, 0x11];
      let p = 0;
      while(codewords.length < QR_DATA_CODEWORDS){
        codewords.push(pads[p % 2]);
        p++;
      }
      return codewords;
    }

    function pushBits(arr, val, count){
      for(let i = count - 1; i >= 0; i--){
        arr.push((val >>> i) & 1);
      }
    }

    function buildBaseMatrixV3(){
      const size = QR_V3_SIZE;
      const modules = Array.from({length:size}, () => Array(size).fill(false));
      const isFunction = Array.from({length:size}, () => Array(size).fill(false));

      function set(x, y, dark, func=true){
        if(x < 0 || y < 0 || x >= size || y >= size) return;
        modules[y][x] = !!dark;
        if(func) isFunction[y][x] = true;
      }

      function drawFinder(x, y){
        for(let dy = -1; dy <= 7; dy++){
          for(let dx = -1; dx <= 7; dx++){
            const xx = x + dx, yy = y + dy;
            const inRange = dx >= 0 && dx <= 6 && dy >= 0 && dy <= 6;
            let dark = false;
            if(inRange){
              if(dx === 0 || dx === 6 || dy === 0 || dy === 6) dark = true;
              else if(dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4) dark = true;
            }
            set(xx, yy, dark, true);
          }
        }
      }

      function drawAlignment(cx, cy){
        for(let dy = -2; dy <= 2; dy++){
          for(let dx = -2; dx <= 2; dx++){
            const dist = Math.max(Math.abs(dx), Math.abs(dy));
            set(cx + dx, cy + dy, dist !== 1, true);
          }
        }
      }

      drawFinder(0, 0); drawFinder(size - 7, 0); drawFinder(0, size - 7);
      for(let i = 8; i < size - 8; i++){
        set(i, 6, i % 2 === 0, true);
        set(6, i, i % 2 === 0, true);
      }
      drawAlignment(22, 22);
      set(8, size - 8, true, true);

      for(let i = 0; i < 9; i++){
        if(i !== 6){ set(8, i, false, true); set(i, 8, false, true); }
      }
      for(let i = 0; i < 8; i++){
        set(size - 1 - i, 8, false, true); set(8, size - 1 - i, false, true);
      }
      return {modules, isFunction};
    }

    function placeDataBits(modules, isFunction, codewords){
      const size = modules.length;
      const bits = [];
      for(const cw of codewords){
        for(let i = 7; i >= 0; i--) bits.push((cw >>> i) & 1);
      }
      let bitIndex = 0, upward = true;

      for(let right = size - 1; right >= 1; right -= 2){
        if(right === 6) right--;
        for(let vert = 0; vert < size; vert++){
          const y = upward ? (size - 1 - vert) : vert;
          for(let j = 0; j < 2; j++){
            const x = right - j;
            if(isFunction[y][x]) continue;
            const bit = bitIndex < bits.length ? bits[bitIndex] : 0;
            modules[y][x] = !!bit;
            bitIndex++;
          }
        }
        upward = !upward;
      }
    }

    function maskBit(mask, x, y){
      switch(mask){
        case 0: return ((x + y) % 2) === 0;
        case 1: return (y % 2) === 0;
        case 2: return (x % 3) === 0;
        case 3: return ((x + y) % 3) === 0;
        case 4: return ((Math.floor(y / 2) + Math.floor(x / 3)) % 2) === 0;
        case 5: return (((x * y) % 2) + ((x * y) % 3)) === 0;
        case 6: return ((((x * y) % 2) + ((x * y) % 3)) % 2) === 0;
        case 7: return ((((x + y) % 2) + ((x * y) % 3)) % 2) === 0;
        default: return false;
      }
    }

    function applyMask(modules, isFunction, mask){
      const size = modules.length;
      for(let y = 0; y < size; y++){
        for(let x = 0; x < size; x++){
          if(!isFunction[y][x] && maskBit(mask, x, y)){
            modules[y][x] = !modules[y][x];
          }
        }
      }
    }

    function drawFormatInfo(modules, mask){
      const size = modules.length;
      const data = QR_FORMAT_INFO_L[mask];
      const getBit = i => ((data >>> i) & 1) !== 0;

      for(let i = 0; i <= 5; i++) modules[8][i] = getBit(14 - i);
      modules[8][7] = getBit(8); modules[8][8] = getBit(7); modules[7][8] = getBit(6);
      for(let i = 5; i >= 0; i--) modules[i][8] = getBit(5 - i);
      for(let i = 0; i < 8; i++) modules[8][size - 1 - i] = getBit(i);
      for(let i = 0; i < 7; i++) modules[size - 7 + i][8] = getBit(14 - i);
    }

    function calcPenalty(modules){
      const size = modules.length; let penalty = 0;
      for(let y = 0; y < size; y++){
        let runColor = modules[y][0], runLen = 1;
        for(let x = 1; x < size; x++){
          if(modules[y][x] === runColor) runLen++;
          else{ if(runLen >= 5) penalty += 3 + (runLen - 5); runColor = modules[y][x]; runLen = 1; }
        }
        if(runLen >= 5) penalty += 3 + (runLen - 5);
      }
      for(let x = 0; x < size; x++){
        let runColor = modules[0][x], runLen = 1;
        for(let y = 1; y < size; y++){
          if(modules[y][x] === runColor) runLen++;
          else{ if(runLen >= 5) penalty += 3 + (runLen - 5); runColor = modules[y][x]; runLen = 1; }
        }
        if(runLen >= 5) penalty += 3 + (runLen - 5);
      }
      for(let y = 0; y < size - 1; y++){
        for(let x = 0; x < size - 1; x++){
          const c = modules[y][x];
          if(modules[y][x+1] === c && modules[y+1][x] === c && modules[y+1][x+1] === c) penalty += 3;
        }
      }
      const p1 = [true,false,true,true,true,false,true,false,false,false,false];
      const p2 = [false,false,false,false,true,false,true,true,true,false,true];
      function sameSeq(arr, start, pattern){
        for(let i = 0; i < pattern.length; i++) if(arr[start + i] !== pattern[i]) return false;
        return true;
      }
      for(let y = 0; y < size; y++){
        const row = modules[y];
        for(let x = 0; x <= size - 11; x++){
          if(sameSeq(row, x, p1) || sameSeq(row, x, p2)) penalty += 40;
        }
      }
      for(let x = 0; x < size; x++){
        const col = []; for(let y = 0; y < size; y++) col.push(modules[y][x]);
        for(let y = 0; y <= size - 11; y++){
          if(sameSeq(col, y, p1) || sameSeq(col, y, p2)) penalty += 40;
        }
      }
      let dark = 0;
      for(let y = 0; y < size; y++) for(let x = 0; x < size; x++) if(modules[y][x]) dark++;
      const percent = dark * 100 / (size * size);
      const k = Math.floor(Math.abs(percent - 50) / 5);
      penalty += k * 10;
      return penalty;
    }

    function drawMatrixToCanvas(matrix, scale = 8, border = 4, targetId = "qrcode"){
      const size = matrix.length;
      const full = size + border * 2;
      const canvas = document.createElement("canvas");
      canvas.width = full * scale;
      canvas.height = full * scale;
      const ctx = canvas.getContext("2d");
      
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000000";
      
      for(let y = 0; y < size; y++){
        for(let x = 0; x < size; x++){
          if(matrix[y][x]){
            ctx.fillRect((x + border) * scale, (y + border) * scale, scale, scale);
          }
        }
      }
      const wrap = document.getElementById(targetId);
      if(wrap){ wrap.innerHTML = ""; wrap.appendChild(canvas); }
    }

    const GF_EXP = new Array(512).fill(0);
    const GF_LOG = new Array(256).fill(0);
    (function initGF(){
      let x = 1;
      for(let i = 0; i < 255; i++){ GF_EXP[i] = x; GF_LOG[x] = i; x <<= 1; if(x & 0x100) x ^= 0x11D; }
      for(let i = 255; i < 512; i++) GF_EXP[i] = GF_EXP[i - 255];
    })();

    function gfMul(a, b){
      if(a === 0 || b === 0) return 0;
      return GF_EXP[GF_LOG[a] + GF_LOG[b]];
    }

    function polyMultiply(p, q){
      const out = new Array(p.length + q.length - 1).fill(0);
      for(let i = 0; i < p.length; i++){
        for(let j = 0; j < q.length; j++) out[i + j] ^= gfMul(p[i], q[j]);
      }
      return out;
    }

    function rsGeneratorPoly(degree){
      let poly = [1];
      for(let i = 0; i < degree; i++) poly = polyMultiply(poly, [1, GF_EXP[i]]);
      return poly;
    }

    function reedSolomonCompute(data, eccLen){
      const gen = rsGeneratorPoly(eccLen);
      const res = new Array(eccLen).fill(0);
      for(const b of data){
        const factor = b ^ res[0];
        res.shift(); res.push(0);
        for(let i = 0; i < eccLen; i++) res[i] ^= gfMul(gen[i + 1], factor);
      }
      return res;
    }

    /***********************
     * 啟動時鐘
     ***********************/
    setInterval(updateKey, 1000);
    updateKey();
  </script>
</body>
</html>
