<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>台語精熟闖關-積分累積版</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Huninn&family=Iansui&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f8ff;
      --card:#ffffff;
      --line:#dbe4f0;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --success:#16a34a;
      --warning:#d97706;
      --danger:#dc2626;
      --shadow:0 14px 38px rgba(0,0,0,.08);
      --radius:22px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      color:var(--text);
      background:linear-gradient(180deg,#eef4ff 0%, #f8fbff 100%);
      font-family: "Huninn", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      min-height:100vh;
    }

    .wrap{ max-width:1100px; margin:0 auto; padding:20px 18px 52px; }
    .title{ text-align:center; margin:8px 0 18px; }
    .title h1{ margin:0 0 8px; font-size:38px; line-height:1.2; letter-spacing:1px; }
    .title p{ margin:0; color:var(--muted); font-size:17px; }
    .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:28px; }
    .screen{ animation:fade .24s ease; }
    @keyframes fade{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .center{text-align:center}
    .muted{color:var(--muted)}
    .big{font-size:21px}
    .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .row-between{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    .pill{ display:inline-block; padding:8px 14px; border-radius:999px; background:#edf4ff; color:#1d4ed8; font-weight:800; font-size:14px; margin:3px; }
    .student-badge{ display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; background:#eff6ff; color:#1d4ed8; font-weight:800; margin-top:10px; }
    .progress{ width:100%; height:16px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin:14px 0 18px; }
    .progress-bar{ height:100%; width:0%; background:linear-gradient(90deg,#60a5fa,#2563eb); transition:width .25s ease; }
    .meta-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px; margin-top:14px; }
    .meta-box{ padding:16px; border:1px solid var(--line); border-radius:18px; background:#fbfdff; }
    .meta-box .label{ font-size:14px; color:var(--muted); margin-bottom:6px; }
    .meta-box .value{ font-size:23px; font-weight:900; }
    label{ display:block; margin-bottom:8px; font-weight:800; font-size:18px; }
    select, textarea{ width:100%; padding:16px 18px; font-size:20px; border-radius:16px; border:1px solid #cbd5e1; outline:none; font-family:inherit; background:#fff; }
    textarea{ min-height:130px; resize:vertical; font-size:16px; line-height:1.6; }
    button{ appearance:none; border:none; border-radius:16px; padding:14px 18px; font-size:18px; font-weight:900; cursor:pointer; transition:transform .05s ease, background .2s ease, opacity .2s ease; font-family:inherit; }
    button:active{ transform:translateY(1px); }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-primary:hover{ background:var(--primary-dark); }
    .btn-secondary{ background:#e5e7eb; color:#111827; }
    .btn-success{ background:var(--success); color:#fff; }
    .btn-warning{ background:var(--warning); color:#fff; }
    .btn-danger{ background:var(--danger); color:#fff; }
    .question-box{ margin:16px 0 18px; padding:22px; border-radius:20px; border:1px solid var(--line); background:#fcfdff; }
    .question-title{ margin:0; font-size:31px; line-height:1.55; font-weight:900; font-family: "Iansui", "Huninn", sans-serif; }
    .options{ display:grid; gap:14px; margin-top:22px; }
    .option-btn{ width:100%; text-align:left; background:#fff; color:#111827; border:2px solid #d8dee8; padding:18px 18px; font-size:24px; border-radius:18px; min-height:74px; line-height:1.45; }
    .option-btn:hover{ background:#f8fbff; border-color:#93c5fd; }
    .feedback{ margin-top:16px; padding:14px 16px; border-radius:16px; font-size:20px; font-weight:900; display:none; }
    .feedback.success{ display:block; background:#ecfdf3; color:#166534; border:1px solid #bbf7d0; }
    .feedback.error{ display:block; background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .result-code{ word-break:break-all; white-space:pre-wrap; background:#0f172a; color:#f8fafc; border-radius:16px; padding:16px; font-size:16px; line-height:1.6; margin:14px 0; text-align:left; }
    .mastery-row{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin:14px 0; }
    .mastery-chip{ min-width:58px; text-align:center; padding:10px 12px; border-radius:999px; font-weight:900; border:1px solid var(--line); background:#fff; }
    .mastery-chip.pass{ color:#166534; background:#ecfdf3; border-color:#bbf7d0; }
    .mastery-chip.fail{ color:#991b1b; background:#fef2f2; border-color:#fecaca; }
    #qrcode, #statsQrcode, #loadQrVideoWrap{ display:flex; justify-content:center; margin-top:18px; }
    #qrcode canvas, #statsQrcode canvas{ background:#fff; padding:10px; border-radius:12px; border:1px solid var(--line); box-shadow:var(--shadow); }
    .teacher-toggle{ position:fixed; right:14px; bottom:14px; z-index:950; border-radius:999px; padding:10px 12px; font-size:14px; font-weight:900; background:rgba(255,255,255,.94); color:#334155; border:1px solid #cbd5e1; box-shadow:0 8px 24px rgba(0,0,0,.12); }
    .teacher-shell{ margin-top:28px; }
    .hidden{ display:none !important; }
    .parse-panel{ margin-top:10px; padding:18px; background:#f8fbff; border:1px solid var(--line); border-radius:18px; }
    .scanner-box{ margin-top:12px; padding:16px; border:1px solid var(--line); border-radius:18px; background:#fff; }
    .scanner-video-wrap{ margin-top:12px; display:none; text-align:center; }
    #qrVideo, #loadQrVideo{ width:100%; max-width:420px; border-radius:16px; background:#000; border:1px solid var(--line); }
    .modal-overlay{ position:fixed; inset:0; background:rgba(15,23,42,.56); display:flex; align-items:center; justify-content:center; padding:18px; z-index:1000; }
    .modal-card{ width:min(100%,760px); max-height:90vh; overflow:auto; background:#fff; border-radius:24px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .fractal-box{ position:fixed; right:84px; bottom:12px; width:180px; height:180px; border-radius:22px; background:rgba(255,255,255,.32); backdrop-filter:blur(4px); pointer-events:none; z-index:120; overflow:hidden; }
    .fractal-box canvas{ width:100%; height:100%; display:block; opacity:.88; }
    .upload-status{ margin-top:10px; padding:12px 14px; border-radius:12px; font-size:14px; line-height:1.7; display:none; }
    .upload-status.show{ display:block; }
    .upload-status.success{ background:#ecfdf3; border:1px solid #bbf7d0; color:#166534; }
    .upload-status.error{ background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>台語精熟闖關</h1>
      <p>iPad 友善版｜積分累積與身分鎖定系統</p>
    </div>
    <div id="app" class="card"></div>
  </div>

  <div class="fractal-box" aria-hidden="true">
    <canvas id="fractalCanvas" width="180" height="180"></canvas>
  </div>

  <script>
    /***********************
     * 題庫與密鑰設定
     ***********************/
    const DEFAULT_QUESTION_BANK = [
      {"q":"根據課文，阿花仔是對佗位來的？","options":["臺北","高雄","動物病院","動物收容所"],"answer":4,"explain":""},
      {"q":"請問阿爸上軟心的「軟心」臺羅拼音按怎寫？","options":["nng-sin","nńg-sin","nńg-sin","nńg-sim"],"answer":4,"explain":""},
      {"q":"請問「䖙」這字除了「the」閣有啥物讀音？","options":["then","thenn","thé","thénn"],"answer":2,"explain":""},
      {"q":"請問「哈唏」這个語詞是啥物意思？","options":["打呵欠","打噴嚏","打冷顫","打個盹"],"answer":1,"explain":""},
      {"q":"請問輕輕仔的哀兩聲的「哀」是台語的第幾調？","options":["第一調","第三調","第五調","第七調"],"answer":1,"explain":""},
      {"q":"根據課文，作者共阿花仔的手比喻做啥物？","options":["pe̍h-hûn","thia̋n-pú-lah","kòng-uân","ke/kue-nn̄g-ko"],"answer":2,"explain":""},
      {"q":"根據課文第三段，阿花仔用上哀怨的氣口了後，阿爸有啥物款反應？","options":["繼續睏","繼續䖙","即時躘起床","繼續看手機仔"],"answer":3,"explain":""},
      {"q":"請問「煏 piak」這个字佇台語內底有啥物發音特色？","options":["愛合唇","聲較短","音較懸","讀輕聲"],"answer":2,"explain":""},
      {"q":"請問直直幌的「直」臺羅拼音按怎寫？","options":["ti","tī","tit","ti̍t"],"answer":4,"explain":""},
      {"q":"根據課文，阿花仔來佇阿爸溫暖的厝有偌久矣？","options":["一冬","半冬","十個月","十年矣"],"answer":4,"explain":""},
      {"q":"根據課文，阿花仔這陣的年紀差不多偌濟歲？","options":["三歲外","六歲半","超過十歲矣","無法度判斷"],"answer":3,"explain":""},
      {"q":"阿誠（　　　　）佇壁邊，看起來真無爽快。","options":["徛","蝹","坐","看"],"answer":2,"explain":""},
      {"q":"根據課文，阿花仔心情好的時耳仔會親像啥物欲起飛？","options":["鳥仔","燕仔","直升機","飛行機"],"answer":4,"explain":""},
      {"q":"請問下面佗一个與語詞佮「貓霧仔光」相仝？","options":["拍殕仔光","略略仔光","殕色的光","暗淡的光"],"answer":1,"explain":""},
      {"q":"「（　　　　）看貓的無點。」請問這句俗語應該添佗一个語詞才會成立？","options":["毋免","毋通","毋才","毋是"],"answer":2,"explain":""},
      {"q":"「耳仔生兩葉，家己看袂著。」請問這句俗語應該是押啥物韻？","options":["h","t","ioh","hioh"],"answer":3,"explain":""},
      {"q":"請問狗毋嫌主人散的「散」，讀音佮下面佗一个相仝？","options":["四「散」","「散」工","「散」會","「散」仙"],"answer":3,"explain":""},
      {"q":"請問「無捨施」的語詞應該按怎解說較適當？","options":["誠無奈","誠無情","真可憐","真可惡"],"answer":3,"explain":""},
      {"q":"請問下面佗一个語詞的字佮耳仔的「耳」仝款有鼻化韻？","options":["「哈」唏","「煏」開","「流」浪","「聲」嗽"],"answer":4,"explain":""},
      {"q":"請問下面佗一个語句使用的「動詞」較無通順、無適當？","options":["阿公䖙佇咧膨椅歇睏","阿花暗時一直烏白吠","阿真透早躘去體育場","阿元無爽快蝹佇門邊"],"answer":3,"explain":""},
      {"q":"根據課文內容，下面佗一个選項的描述無正確？","options":["阿花仔的主人足歹心","阿花仔的主人足好心","阿花仔的手袂輸 thia̋n-pú-lah","阿花仔這陣有歲仔，目睭無好"],"answer":1,"explain":""},
      {"q":"根據俗語的介紹，下面佗一句俗語佮「先苦，而後甘」的意思較倚近？","options":["狗無嫌主人散","毋通看貓的無點","艱苦頭，快活尾","耳仔生兩葉，家己看袂著"],"answer":3,"explain":""}
    ];

    const SECRET_SALT = "TAIGI_MASTER"; // 校驗碼密鑰，保持與解譯端一致
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScDInn5Vn1UwxYqzeuMhcdZAFE20ErqPURU8zurg_lRsWwbUg/viewform?usp=sharing";

    const state = {
      classCode: "",
      seatNo: "",
      points: 0,
      currentLevelIndex: 0,
      currentQuestionIndex: 0,
      levelCorrect: 0,
      levelTotal: 0,
      totalCorrect: 0,
      totalTotal: 0,
      masteryBits: [],
      finished: false,
      rounds: 1 // 挑戰輪數
    };

    let activeQuestionBank = [];

    /***********************
     * 核心解譯與編碼邏輯
     ***********************/
    function $(id){ return document.getElementById(id); }
    function pad2(n){ return String(n).padStart(2, "0"); }

    // 縮短時間碼：只取月、日、時、分 (8碼)
    function getShortTimestamp(){
      const now = new Date();
      return `${pad2(now.getMonth()+1)}${pad2(now.getDate())}${pad2(now.getHours())}${pad2(now.getMinutes())}`;
    }

    // 計算 4 碼校驗位 (Checksum)
    function calculateVCode(payload){
      let hash = 0;
      const str = payload + SECRET_SALT;
      for(let i=0; i<str.length; i++){
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString(36).toUpperCase().slice(-4);
    }

    function generateResultString(){
      const mastery = activeQuestionBank.map((_, idx) => state.masteryBits[idx] ? "1" : "0").join("");
      const payload = [
        "TG",
        `G${state.classCode}`,
        `N${state.seatNo}`,
        `S${state.points}`,
        `T${state.totalTotal + state.levelTotal}`,
        `C${state.totalCorrect + state.levelCorrect}`,
        `M${mastery}`,
        `D${getShortTimestamp()}`
      ].join("|");
      return `${payload}|V${calculateVCode(payload)}`;
    }

    function parseResultString(str){
      const raw = String(str || "").trim();
      const parts = raw.split("|");
      if(parts.length < 8 || parts[0] !== "TG") return null;

      const obj = {};
      let payloadParts = [];
      for(const p of parts){
        const key = p.charAt(0);
        obj[key] = p.slice(1);
        if(key !== "V") payloadParts.push(p);
      }

      // 驗證校驗碼
      if(obj.V !== calculateVCode(payloadParts.join("|"))) return { error: "防竄改驗證失敗！結果碼已被修改。" };

      return {
        classCode: obj.G,
        seatNo: obj.N,
        points: Number(obj.S || 0),
        total: Number(obj.T),
        correct: Number(obj.C),
        mastery: obj.M,
        timestamp: obj.D
      };
    }

    /***********************
     * 畫面流程邏輯
     ***********************/
    function showStart(){
      $("app").innerHTML = `
        <div class="screen center">
          <h2>開始挑戰</h2>
          <div class="meta-grid" style="max-width:600px; margin:20px auto;">
            <div>
              <label>班級</label>
              <select id="studentClass">
                <option value="">請選擇</option>
                ${Array.from({length:9}, (_,i)=>701+i).map(c=>`<option value="${c}">${c}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>座號</label>
              <select id="studentSeat">
                <option value="">請選擇</option>
                ${Array.from({length:40}, (_,i)=>i+1).map(n=>`<option value="${pad2(n)}">${n} 號</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="row" style="justify-content:center;">
            <button class="btn-primary" onclick="startGame()">正式挑戰</button>
            <button class="btn-secondary" onclick="showLoadProgressModal()">載入進度</button>
          </div>
        </div>
      `;
    }

    function startGame(){
      const cls = $("studentClass").value;
      const seat = $("studentSeat").value;
      if(!cls || !seat){ alert("請選擇班級與座號"); return; }
      state.classCode = cls;
      state.seatNo = seat;
      activeQuestionBank = buildActiveQuestionBank(DEFAULT_QUESTION_BANK);
      showQuestion();
    }

    // 載入進度視窗 (新增相機功能)
    function showLoadProgressModal(){
      const modal = document.createElement("div");
      modal.id = "loadModal";
      modal.className = "modal-overlay";
      modal.innerHTML = `
        <div class="modal-card">
          <div class="row-between" style="padding:20px;">
            <h2 style="margin:0;">載入進度</h2>
            <button class="btn-secondary" onclick="closeLoadModal()">關閉</button>
          </div>
          <div class="parse-panel" style="margin:0 20px 20px;">
            <p class="muted">1. 請先在首頁選好班級與座號</p>
            <button class="btn-success" style="width:100%;" onclick="startLoadQrScanner()">開啟相機掃描 QR</button>
            <div id="loadQrVideoWrap" class="scanner-video-wrap">
              <video id="loadQrVideo" autoplay playsinline muted></video>
            </div>
            <textarea id="loadInput" placeholder="或在此貼上結果碼..." style="margin-top:10px;"></textarea>
            <button class="btn-primary" style="width:100%;margin-top:10px;" onclick="confirmLoad()">確定載入</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function confirmLoad(){
      const raw = $("loadInput").value.trim();
      const curCls = $("studentClass").value;
      const curSeat = $("studentSeat").value;
      if(!curCls || !curSeat){ alert("載入前請先選擇班級與座號！"); return; }

      const p = parseResultString(raw);
      if(!p){ alert("格式錯誤！"); return; }
      if(p.error){ alert(p.error); return; }

      // 檢查身分鎖定 (不透露該代碼是誰的)
      if(p.classCode !== curCls || p.seatNo !== curSeat){
        alert("身分不符！這不是你的專屬進度碼，請確認是否掃描錯誤。");
        return;
      }

      state.points = p.points;
      state.totalCorrect = p.correct;
      state.totalTotal = p.total;
      state.masteryBits = p.mastery.split("").map(Number);
      state.currentLevelIndex = Math.min(state.masteryBits.length, 3);
      
      activeQuestionBank = buildActiveQuestionBank(DEFAULT_QUESTION_BANK);
      closeLoadModal();
      alert(`載入成功！目前累積積分：${state.points}`);
      showQuestion();
    }

    function showQuestion(){
      const q = activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex];
      $("app").innerHTML = `
        <div class="screen">
          <div class="row-between">
            <div class="pill">Level ${state.currentLevelIndex + 1} | Q ${state.currentQuestionIndex + 1}/5</div>
            <div class="pill" style="color:#d97706; background:#fffbeb;">積分：${state.points}</div>
          </div>
          <div class="student-badge">${state.classCode} 班 ${Number(state.seatNo)} 號</div>
          <div class="question-box">
            <p class="question-title">${q.q}</p>
            <div class="options">
              ${q.options.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`).join("")}
            </div>
            <div id="feedback" class="feedback"></div>
          </div>
          <div class="row" style="justify-content:center; gap:10px; margin-top:16px;">
            <button class="btn-secondary" onclick="showStats()">查看統計卡片</button>
            <button class="btn-warning" onclick="saveProgressModal()">💾 中途存檔上傳</button>
          </div>
        </div>
      `;
    }

    function checkAnswer(idx){
      const q = activeQuestionBank[state.currentLevelIndex].questions[state.currentQuestionIndex];
      const isCorrect = idx === q.answer;
      state.levelTotal++;
      if(isCorrect){
        state.levelCorrect++;
        state.points += 10;
      }
      fractalForest.grow();
      const fb = $("feedback");
      fb.className = isCorrect ? "feedback success" : "feedback error";
      fb.innerHTML = isCorrect ? "答對了！積分 +10" : "答錯了。";
      fb.style.display = "block";
      
      document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
      setTimeout(() => {
        state.currentQuestionIndex++;
        if(state.currentQuestionIndex >= 5) finishLevel();
        else showQuestion();
      }, 1000);
    }

    function finishLevel(){
      const passed = state.levelCorrect >= 3;
      $("app").innerHTML = `
        <div class="screen center">
          <h2>Level ${state.currentLevelIndex+1} 結束</h2>
          <div class="meta-box" style="margin:20px auto; max-width:200px;">
            <div class="label">本關答對</div>
            <div class="value">${state.levelCorrect}/5</div>
          </div>
          <div class="row" style="justify-content:center;">
            ${passed ? `<button class="btn-success" onclick="nextLevel()">前進下一關</button>` : `<button class="btn-warning" onclick="retryLevel()">重試本關</button>`}
          </div>
        </div>
      `;
    }

    function nextLevel(){
      state.masteryBits.push(1);
      state.totalCorrect += state.levelCorrect;
      state.totalTotal += state.levelTotal;
      state.currentLevelIndex++;
      state.levelCorrect = 0;
      state.levelTotal = 0;
      state.currentQuestionIndex = 0;
      if(state.currentLevelIndex >= 4) finishGame();
      else showQuestion();
    }

    function retryLevel(){

    function buildActiveQuestionBank(qBank){
      // 隨機抽題邏輯
      const shuffled = [...qBank].sort(() => Math.random() - 0.5);
      const levels = [];
      for(let i=0; i<4; i++){
        const qs = shuffled.slice(i*5, (i+1)*5).map(q => {
          const opts = [...q.options];
          const ansText = opts[q.answer-1];
          opts.sort(() => Math.random() - 0.5);
          return { q: q.q, options: opts, answer: opts.indexOf(ansText) };
        });
        levels.push({ level: i+1, questions: qs });
      }
      return levels;
    }

    /***********************
     * 碎形樹繪製邏輯（完整版）
     ***********************/
    const fractalForest = {
      canvas: null,
      ctx: null,
      trees: [],
      maxLevel: 11,
      currentTreeIndex: 0,

      init(){
        this.canvas = $("fractalCanvas");
        if(!this.canvas) return;
        this.ctx = this.canvas.getContext("2d");
        this.reset();
      },

      reset(){
        if(!this.ctx) return;
        this.trees = [];
        this.currentTreeIndex = 0;
        this.trees.push(this.makeTree(this.canvas.width * 0.28, this.canvas.height - 10, 44));
        this.draw();
      },

      makeTree(x, y, length){
        const hue = Math.random() * 360;
        return {
          x,
          y,
          initialLength: length,
          level: 1,
          colorScheme: {
            base: `hsla(${hue}, 58%, 28%, .88)`,
            highlight: `hsla(${hue}, 68%, 38%, .88)`,
            light: `hsla(${hue}, 74%, 50%, .88)`
          }
        };
      },

      getRandomAngle(){
        const degrees = 20 + Math.random() * 18;
        return degrees * Math.PI / 180;
      },

      grow(){
        if(!this.ctx) return;
        const currentTree = this.trees[this.currentTreeIndex];
        if(currentTree.level < this.maxLevel){
          currentTree.level++;
        }else{
          const spacing = 42;
          const newX = 24 + this.trees.length * spacing;
          if(newX < this.canvas.width - 20){
            const prevLength = this.trees[this.currentTreeIndex].initialLength;
            this.trees.push(this.makeTree(newX, this.canvas.height - 10, Math.max(24, prevLength * 0.86)));
            this.currentTreeIndex++;
          }else{
            this.reset();
            return;
          }
        }
        this.draw();
      },

      drawBranch(startX, startY, len, angle, depth, colorScheme){
        const ctx = this.ctx;
        ctx.beginPath();
        ctx.save();

        ctx.translate(startX, startY);
        ctx.rotate(angle);
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -len);

        const depthRatio = depth / this.maxLevel;
        ctx.strokeStyle =
          depthRatio > 0.7 ? colorScheme.light :
          depthRatio > 0.35 ? colorScheme.highlight :
          colorScheme.base;

        ctx.lineWidth = Math.max(1, depth * 0.62);
        ctx.stroke();

        if(depth > 0){
          const rightAngle = this.getRandomAngle();
          const leftAngle = this.getRandomAngle();
          this.drawBranch(0, -len, len * 0.74, rightAngle, depth - 1, colorScheme);
          this.drawBranch(0, -len, len * 0.74, -leftAngle, depth - 1, colorScheme);
        }

        ctx.restore();
      },

      draw(){
        if(!this.ctx) return;
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        ctx.fillStyle = "rgba(255,255,255,.15)";
        ctx.fillRect(0,0,this.canvas.width,this.canvas.height);

        this.trees.forEach(tree=>{
          this.drawBranch(tree.x, tree.y, tree.initialLength, 0, tree.level, tree.colorScheme);
        });
      }
    };

    /***********************
     * 離線 QR Code 生成演算法（完整版）
     ***********************/
    const QR_V3_SIZE = 29;
    const QR_DATA_CODEWORDS = 55;
    const QR_ECC_CODEWORDS = 15;
    const QR_FORMAT_INFO_L = {
      0: 0b111011111000100,
      1: 0b111001011110011,
      2: 0b111110110101010,
      3: 0b111100010011101,
      4: 0b110011000101111,
      5: 0b110001100011000,
      6: 0b110110001000001,
      7: 0b110100101110110
    };

    function renderOfflineQRCode(text, targetId = "qrcode"){
      const bytes = utf8Bytes(text);
      if(bytes.length > 53){
        throw new Error("結果字串過長，超出目前內建 QR 容量。");
      }

      const dataCodewords = makeQRDataCodewords(bytes);
      const ecc = reedSolomonCompute(dataCodewords, QR_ECC_CODEWORDS);
      const allCodewords = dataCodewords.concat(ecc);

      let bestMatrix = null;
      let bestPenalty = Infinity;

      for(let mask = 0; mask < 8; mask++){
        const {modules, isFunction} = buildBaseMatrixV3();
        placeDataBits(modules, isFunction, allCodewords);
        applyMask(modules, isFunction, mask);
        drawFormatInfo(modules, mask);
        const penalty = calcPenalty(modules);
        if(penalty < bestPenalty){
          bestPenalty = penalty;
          bestMatrix = modules.map(row => row.slice());
        }
      }

      drawMatrixToCanvas(bestMatrix, 8, 4, targetId);
    }

    function utf8Bytes(str){
      return Array.from(new TextEncoder().encode(str));
    }

    function makeQRDataCodewords(bytes){
      const bits = [];
      pushBits(bits, 0b0100, 4);
      pushBits(bits, bytes.length, 8);

      for(const b of bytes) pushBits(bits, b, 8);

      const maxBits = QR_DATA_CODEWORDS * 8;
      let terminator = Math.min(4, maxBits - bits.length);
      for(let i = 0; i < terminator; i++) bits.push(0);
      while(bits.length % 8 !== 0) bits.push(0);

      const codewords = [];
      for(let i = 0; i < bits.length; i += 8){
        let val = 0;
        for(let j = 0; j < 8; j++) val = (val << 1) | bits[i + j];
        codewords.push(val);
      }

      const pads = [0xEC, 0x11];
      let p = 0;
      while(codewords.length < QR_DATA_CODEWORDS){
        codewords.push(pads[p % 2]);
        p++;
      }
      return codewords;
    }

    function pushBits(arr, val, count){
      for(let i = count - 1; i >= 0; i--){
        arr.push((val >>> i) & 1);
      }
    }

    function buildBaseMatrixV3(){
      const size = QR_V3_SIZE;
      const modules = Array.from({length:size}, () => Array(size).fill(false));
      const isFunction = Array.from({length:size}, () => Array(size).fill(false));

      function set(x, y, dark, func=true){
        if(x < 0 || y < 0 || x >= size || y >= size) return;
        modules[y][x] = !!dark;
        if(func) isFunction[y][x] = true;
      }

      function drawFinder(x, y){
        for(let dy = -1; dy <= 7; dy++){
          for(let dx = -1; dx <= 7; dx++){
            const xx = x + dx, yy = y + dy;
            const inRange = dx >= 0 && dx <= 6 && dy >= 0 && dy <= 6;
            let dark = false;
            if(inRange){
              if(dx === 0 || dx === 6 || dy === 0 || dy === 6) dark = true;
              else if(dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4) dark = true;
            }
            set(xx, yy, dark, true);
          }
        }
      }

      function drawAlignment(cx, cy){
        for(let dy = -2; dy <= 2; dy++){
          for(let dx = -2; dx <= 2; dx++){
            const dist = Math.max(Math.abs(dx), Math.abs(dy));
            set(cx + dx, cy + dy, dist !== 1, true);
          }
        }
      }

      drawFinder(0, 0);
      drawFinder(size - 7, 0);
      drawFinder(0, size - 7);

      for(let i = 8; i < size - 8; i++){
        set(i, 6, i % 2 === 0, true);
        set(6, i, i % 2 === 0, true);
      }

      drawAlignment(22, 22);
      set(8, size - 8, true, true);

      for(let i = 0; i < 9; i++){
        if(i !== 6){
          set(8, i, false, true);
          set(i, 8, false, true);
        }
      }
      for(let i = 0; i < 8; i++){
        set(size - 1 - i, 8, false, true);
        set(8, size - 1 - i, false, true);
      }

      return {modules, isFunction};
    }

    function placeDataBits(modules, isFunction, codewords){
      const size = modules.length;
      const bits = [];
      for(const cw of codewords){
        for(let i = 7; i >= 0; i--) bits.push((cw >>> i) & 1);
      }

      let bitIndex = 0;
      let upward = true;

      for(let right = size - 1; right >= 1; right -= 2){
        if(right === 6) right--;

        for(let vert = 0; vert < size; vert++){
          const y = upward ? (size - 1 - vert) : vert;
          for(let j = 0; j < 2; j++){
            const x = right - j;
            if(isFunction[y][x]) continue;
            const bit = bitIndex < bits.length ? bits[bitIndex] : 0;
            modules[y][x] = !!bit;
            bitIndex++;
          }
        }
        upward = !upward;
      }
    }

    function maskBit(mask, x, y){
      switch(mask){
        case 0: return ((x + y) % 2) === 0;
        case 1: return (y % 2) === 0;
        case 2: return (x % 3) === 0;
        case 3: return ((x + y) % 3) === 0;
        case 4: return ((Math.floor(y / 2) + Math.floor(x / 3)) % 2) === 0;
        case 5: return (((x * y) % 2) + ((x * y) % 3)) === 0;
        case 6: return ((((x * y) % 2) + ((x * y) % 3)) % 2) === 0;
        case 7: return ((((x + y) % 2) + ((x * y) % 3)) % 2) === 0;
        default: return false;
      }
    }

    function applyMask(modules, isFunction, mask){
      const size = modules.length;
      for(let y = 0; y < size; y++){
        for(let x = 0; x < size; x++){
          if(!isFunction[y][x] && maskBit(mask, x, y)){
            modules[y][x] = !modules[y][x];
          }
        }
      }
    }

    function drawFormatInfo(modules, mask){
      const size = modules.length;
      const data = QR_FORMAT_INFO_L[mask];
      const getBit = i => ((data >>> i) & 1) !== 0;

      for(let i = 0; i <= 5; i++) modules[8][i] = getBit(14 - i);
      modules[8][7] = getBit(8);
      modules[8][8] = getBit(7);
      modules[7][8] = getBit(6);
      for(let i = 5; i >= 0; i--) modules[i][8] = getBit(5 - i);

      for(let i = 0; i < 8; i++) modules[8][size - 1 - i] = getBit(i);
      for(let i = 0; i < 7; i++) modules[size - 7 + i][8] = getBit(14 - i);
    }

    function calcPenalty(modules){
      const size = modules.length;
      let penalty = 0;

      for(let y = 0; y < size; y++){
        let runColor = modules[y][0];
        let runLen = 1;
        for(let x = 1; x < size; x++){
          if(modules[y][x] === runColor) runLen++;
          else{
            if(runLen >= 5) penalty += 3 + (runLen - 5);
            runColor = modules[y][x];
            runLen = 1;
          }
        }
        if(runLen >= 5) penalty += 3 + (runLen - 5);
      }

      for(let x = 0; x < size; x++){
        let runColor = modules[0][x];
        let runLen = 1;
        for(let y = 1; y < size; y++){
          if(modules[y][x] === runColor) runLen++;
          else{
            if(runLen >= 5) penalty += 3 + (runLen - 5);
            runColor = modules[y][x];
            runLen = 1;
          }
        }
        if(runLen >= 5) penalty += 3 + (runLen - 5);
      }

      for(let y = 0; y < size - 1; y++){
        for(let x = 0; x < size - 1; x++){
          const c = modules[y][x];
          if(modules[y][x+1] === c && modules[y+1][x] === c && modules[y+1][x+1] === c){
            penalty += 3;
          }
        }
      }

      const p1 = [true,false,true,true,true,false,true,false,false,false,false];
      const p2 = [false,false,false,false,true,false,true,true,true,false,true];

      function sameSeq(arr, start, pattern){
        for(let i = 0; i < pattern.length; i++){
          if(arr[start + i] !== pattern[i]) return false;
        }
        return true;
      }

      for(let y = 0; y < size; y++){
        const row = modules[y];
        for(let x = 0; x <= size - 11; x++){
          if(sameSeq(row, x, p1) || sameSeq(row, x, p2)) penalty += 40;
        }
      }

      for(let x = 0; x < size; x++){
        const col = [];
        for(let y = 0; y < size; y++) col.push(modules[y][x]);
        for(let y = 0; y <= size - 11; y++){
          if(sameSeq(col, y, p1) || sameSeq(col, y, p2)) penalty += 40;
        }
      }

      let dark = 0;
      for(let y = 0; y < size; y++){
        for(let x = 0; x < size; x++){
          if(modules[y][x]) dark++;
        }
      }

      const percent = dark * 100 / (size * size);
      const k = Math.floor(Math.abs(percent - 50) / 5);
      penalty += k * 10;

      return penalty;
    }

    function drawMatrixToCanvas(matrix, scale = 8, border = 4, targetId = "qrcode"){
      const size = matrix.length;
      const full = size + border * 2;
      const canvas = document.createElement("canvas");
      canvas.width = full * scale;
      canvas.height = full * scale;

      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#000000";
      for(let y = 0; y < size; y++){
        for(let x = 0; x < size; x++){
          if(matrix[y][x]){
            ctx.fillRect((x + border) * scale, (y + border) * scale, scale, scale);
          }
        }
      }

      const wrap = $(targetId);
      if(wrap){
        wrap.innerHTML = "";
        wrap.appendChild(canvas);
      }
    }

    /***********************
     * Reed-Solomon 糾錯碼
     ***********************/
    const GF_EXP = new Array(512).fill(0);
    const GF_LOG = new Array(256).fill(0);

    (function initGF(){
      let x = 1;
      for(let i = 0; i < 255; i++){
        GF_EXP[i] = x;
        GF_LOG[x] = i;
        x <<= 1;
        if(x & 0x100) x ^= 0x11D;
      }
      for(let i = 255; i < 512; i++) GF_EXP[i] = GF_EXP[i - 255];
    })();

    function gfMul(a, b){
      if(a === 0 || b === 0) return 0;
      return GF_EXP[GF_LOG[a] + GF_LOG[b]];
    }

    function polyMultiply(p, q){
      const out = new Array(p.length + q.length - 1).fill(0);
      for(let i = 0; i < p.length; i++){
        for(let j = 0; j < q.length; j++){
          out[i + j] ^= gfMul(p[i], q[j]);
        }
      }
      return out;
    }

    function rsGeneratorPoly(degree){
      let poly = [1];
      for(let i = 0; i < degree; i++){
        poly = polyMultiply(poly, [1, GF_EXP[i]]);
      }
      return poly;
    }

    function reedSolomonCompute(data, eccLen){
      const gen = rsGeneratorPoly(eccLen);
      const res = new Array(eccLen).fill(0);

      for(const b of data){
        const factor = b ^ res[0];
        res.shift();
        res.push(0);
        for(let i = 0; i < eccLen; i++){
          res[i] ^= gfMul(gen[i + 1], factor);
        }
      }
      return res;
    }

    /***********************
     * 掃描器邏輯
     ***********************/
    let loadQrStream = null;
    let loadQrRafId = null;
    let loadQrDetector = null;

    async function startLoadQrScanner(){
      const v = $("loadQrVideo");
      const w = $("loadQrVideoWrap");
      try {
        loadQrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        v.srcObject = loadQrStream;
        w.style.display = "block";
        if("BarcodeDetector" in window) loadQrDetector = new window.BarcodeDetector({ formats: ["qr_code"] });
        loadScanLoop();
      } catch (err) { alert("無法啟動相機"); }
    }

    function loadScanLoop(){
      const v = $("loadQrVideo");
      if(v && v.readyState >= 2 && loadQrDetector){
        loadQrDetector.detect(v).then(results => {
          if(results.length > 0){
            $("loadInput").value = results[0].rawValue;
            stopLoadScanner();
            confirmLoad();
          } else { loadQrRafId = requestAnimationFrame(loadScanLoop); }
        });
      } else { loadQrRafId = requestAnimationFrame(loadScanLoop); }
    }

    function stopLoadScanner(){
      if(loadQrStream) loadQrStream.getTracks().forEach(t => t.stop());
      if($("loadQrVideoWrap")) $("loadQrVideoWrap").style.display = "none";
      if(loadQrRafId) cancelAnimationFrame(loadQrRafId);
    }

    function closeLoadModal(){ 
      stopLoadScanner(); 
      if($("loadModal")) $("loadModal").remove(); 
    }

    window.addEventListener("beforeunload", ()=>{
      stopLoadScanner();
    });

    window.onload = () => { 
      fractalForest.init(); 
      showStart(); 
    };
  </script>
</body>
</html>
